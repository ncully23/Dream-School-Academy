<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Profile - Dream School</title>
  <link rel="stylesheet" href="./assets/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom, #2c2c2c, #000000);
      color: white;
      padding: 40px;
    }
    h2 {
      font-size: 2.2rem;
      color: #f0c948;
      margin-bottom: 20px;
    }
    .profile-container {
      max-width: 700px;
      margin: auto;
      background-color: #121212;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
      text-align: left;
    }
    .profile-field {
      margin-bottom: 20px;
    }
    .profile-label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }
    input[type="text"], select {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      background-color: #1a1a1a;
      color: white;
      margin-top: 5px;
    }
    .button-row {
      margin-top: 8px;
    }
    button {
      font-size: 0.9rem;
      font-weight: bold;
      border: none;
      border-radius: 20px;
      padding: 8px 16px;
      margin-right: 6px;
      cursor: pointer;
    }
    .edit-btn {
      background-color: #f0c948;
      color: black;
    }
    .save-btn {
      background-color: #3399ff;
      color: white;
    }
    .cancel-btn {
      background-color: #444;
      color: white;
    }
    .status {
      display: inline-block;
      margin-left: 10px;
      font-size: 0.9rem;
      color: #8bc34a;
    }
  </style>
</head>
<body>
  <header>
    <h1><a href="/home.html" style="text-decoration: none; color: #f0c948;">Dream School</a></h1>
  </header>

  <main>
    <h2>Your Profile</h2>
    <div class="profile-container" id="profile-form">
      <!-- Template Fields -->
      <div class="profile-field" data-field="name">
        <label class="profile-label">Nickname</label>
        <input type="text" id="name" disabled />
        <div class="button-row">
          <button class="edit-btn" onclick="enableEdit('name')">Edit</button>
          <button class="save-btn" onclick="saveField('name')" style="display:none;">Save</button>
          <button class="cancel-btn" onclick="cancelEdit('name')" style="display:none;">Cancel</button>
          <span class="status" id="name-status"></span>
        </div>
      </div>

      <!-- Repeat for each field -->
      <div class="profile-field" data-field="gradYear">
        <label class="profile-label">Graduation Year</label>
        <select id="gradYear" disabled>
          <option value="">Select Year</option>
          <option value="2024">2024</option>
          <option value="2025">2025</option>
          <option value="2026">2026</option>
          <option value="2027">2027</option>
          <option value="2028">2028</option>
          <option value="2029">2029</option>
        </select>
        <div class="button-row">
          <button class="edit-btn" onclick="enableEdit('gradYear')">Edit</button>
          <button class="save-btn" onclick="saveField('gradYear')" style="display:none;">Save</button>
          <button class="cancel-btn" onclick="cancelEdit('gradYear')" style="display:none;">Cancel</button>
          <span class="status" id="gradYear-status"></span>
        </div>
      </div>

      <div class="profile-field" data-field="dreamSchools">
        <label class="profile-label">Dream Schools</label>
        <input type="text" id="dreamSchools" disabled />
        <div class="button-row">
          <button class="edit-btn" onclick="enableEdit('dreamSchools')">Edit</button>
          <button class="save-btn" onclick="saveField('dreamSchools')" style="display:none;">Save</button>
          <button class="cancel-btn" onclick="cancelEdit('dreamSchools')" style="display:none;">Cancel</button>
          <span class="status" id="dreamSchools-status"></span>
        </div>
      </div>

      <div class="profile-field" data-field="safetySchools">
        <label class="profile-label">Safety Schools</label>
        <input type="text" id="safetySchools" disabled />
        <div class="button-row">
          <button class="edit-btn" onclick="enableEdit('safetySchools')">Edit</button>
          <button class="save-btn" onclick="saveField('safetySchools')" style="display:none;">Save</button>
          <button class="cancel-btn" onclick="cancelEdit('safetySchools')" style="display:none;">Cancel</button>
          <span class="status" id="safetySchools-status"></span>
        </div>
      </div>

      <div class="profile-field" data-field="satGoal">
        <label class="profile-label">SAT Goal</label>
        <input type="text" id="satGoal" disabled />
        <div class="button-row">
          <button class="edit-btn" onclick="enableEdit('satGoal')">Edit</button>
          <button class="save-btn" onclick="saveField('satGoal')" style="display:none;">Save</button>
          <button class="cancel-btn" onclick="cancelEdit('satGoal')" style="display:none;">Cancel</button>
          <span class="status" id="satGoal-status"></span>
        </div>
      </div>

      <div class="profile-field" data-field="classes">
        <label class="profile-label">Current Classes</label>
        <input type="text" id="classes" disabled />
        <div class="button-row">
          <button class="edit-btn" onclick="enableEdit('classes')">Edit</button>
          <button class="save-btn" onclick="saveField('classes')" style="display:none;">Save</button>
          <button class="cancel-btn" onclick="cancelEdit('classes')" style="display:none;">Cancel</button>
          <span class="status" id="classes-status"></span>
        </div>
      </div>

      <div class="profile-field" data-field="extracurriculars">
        <label class="profile-label">Extracurriculars</label>
        <input type="text" id="extracurriculars" disabled />
        <div class="button-row">
          <button class="edit-btn" onclick="enableEdit('extracurriculars')">Edit</button>
          <button class="save-btn" onclick="saveField('extracurriculars')" style="display:none;">Save</button>
          <button class="cancel-btn" onclick="cancelEdit('extracurriculars')" style="display:none;">Cancel</button>
          <span class="status" id="extracurriculars-status"></span>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 Dream School. All rights reserved.</p>
  </footer>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD7R7ZsmTpGojgLNt7w_R0tm_mWg_FZEYE",
      authDomain: "dream-school-academy.firebaseapp.com",
      projectId: "dream-school-academy",
      storageBucket: "dream-school-academy.appspot.com",
      messagingSenderId: "665412130733",
      appId: "1:665412130733:web:c3d59ab2c2f065a2277324"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let currentUserRef = null;
    let originalValues = {};

    auth.onAuthStateChanged(user => {
      if (!user) return (window.location.href = "/home.html");

      currentUserRef = db.collection("userProfiles").doc(user.uid);
      currentUserRef.get().then(doc => {
        const data = doc.exists ? doc.data() : {
          name: "", gradYear: "", dreamSchools: "",
          safetySchools: "", satGoal: "", classes: "", extracurriculars: ""
        };
        if (!doc.exists) currentUserRef.set(data);
        loadProfile(data);
      });
    });

    function loadProfile(data) {
      for (const key in data) {
        const el = document.getElementById(key);
        if (el) {
          el.value = data[key];
          originalValues[key] = data[key];
        }
      }
    }

    function enableEdit(field) {
      const input = document.getElementById(field);
      const parent = input.parentElement;
      parent.querySelector(".edit-btn").style.display = "none";
      parent.querySelector(".save-btn").style.display = "inline-block";
      parent.querySelector(".cancel-btn").style.display = "inline-block";
      input.disabled = false;
    }

    function cancelEdit(field) {
      const input = document.getElementById(field);
      const parent = input.parentElement;
      input.value = originalValues[field];
      input.disabled = true;
      parent.querySelector(".edit-btn").style.display = "inline-block";
      parent.querySelector(".save-btn").style.display = "none";
      parent.querySelector(".cancel-btn").style.display = "none";
    }

    function saveField(field) {
      const input = document.getElementById(field);
      const parent = input.parentElement;
      const status = parent.querySelector(".status");
      const value = input.value;
      currentUserRef.set({ [field]: value }, { merge: true }).then(() => {
        originalValues[field] = value;
        input.disabled = true;
        parent.querySelector(".edit-btn").style.display = "inline-block";
        parent.querySelector(".save-btn").style.display = "none";
        parent.querySelector(".cancel-btn").style.display = "none";
        status.textContent = "✅ Saved!";
        setTimeout(() => (status.textContent = ""), 2000);
      }).catch(err => {
        console.error(err);
        status.textContent = "❌ Error saving";
      });
    }
  </script>
</body>
</html>
