<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Profile - Dream School</title>
  <link rel="stylesheet" href="./assets/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom, #2c2c2c, #000000);
      color: white;
      padding: 40px;
    }

    h2 {
      font-size: 2.2rem;
      color: #f0c948;
      margin-bottom: 20px;
    }

    form {
      max-width: 700px;
      margin: auto;
      background-color: #121212;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
      text-align: left;
    }

    label {
      display: block;
      margin-top: 20px;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 1.1rem;
    }

    input[type="text"],
    input[type="email"],
    select {
      width: 100%;
      padding: 16px;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      background-color: #1a1a1a;
      color: white;
    }

    button[type="submit"] {
      margin-top: 30px;
      padding: 16px 30px;
      background-color: #3399ff;
      color: white;
      font-size: 1.1rem;
      font-weight: bold;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.2s ease;
    }

    button[type="submit"]:hover {
      background-color: #2678c8;
      transform: scale(1.03);
    }

    footer {
      text-align: center;
      margin-top: 50px;
      color: #aaa;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1><a href="/home.html" style="text-decoration: none; color: #f0c948;">Dream School</a></h1>
  </header>

  <main>
    <h2>Your Profile</h2>
    <form id="profile-form">
      <label for="name">Name</label>
      <input type="text" id="name" required />

      <label for="gradYear">Graduation Year</label>
      <select id="gradYear" required>
        <option value="">Select Year</option>
        <option value="2024">2024</option>
        <option value="2025">2025</option>
        <option value="2026">2026</option>
        <option value="2027">2027</option>
        <option value="2028">2028</option>
        <option value="2029">2029</option>
        <option value="2030">2030</option>
      </select>

      <label for="dreamSchools">Dream Schools</label>
      <input type="text" id="dreamSchools" />

      <label for="safetySchools">Safety Schools</label>
      <input type="text" id="safetySchools" />

      <label for="satGoal">SAT Goal</label>
      <input type="text" id="satGoal" />

      <label for="classes">Current Classes</label>
      <input type="text" id="classes" />

      <label for="extracurriculars">Extracurriculars</label>
      <input type="text" id="extracurriculars" />

      <button type="submit">💾 Save Profile</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2025 Dream School. All rights reserved.</p>
  </footer>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD7R7ZsmTpGojgLNt7w_R0tm_mWg_FZEYE",
      authDomain: "dream-school-academy.firebaseapp.com",
      projectId: "dream-school-academy",
      storageBucket: "dream-school-academy.firebasestorage.app",
      messagingSenderId: "665412130733",
      appId: "1:665412130733:web:c3d59ab2c2f065a2277324",
      measurementId: "G-HJCW8VZKZX"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const form = document.getElementById("profile-form");

    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = "/home.html";
      } else {
        const uid = user.uid;
        const userRef = db.collection("users").doc(uid);

        // Load saved data
        userRef.get().then(doc => {
          if (doc.exists) {
            const data = doc.data();
            document.getElementById("name").value = data.name || "";
            document.getElementById("gradYear").value = data.gradYear || "";
            document.getElementById("dreamSchools").value = data.dreamSchools || "";
            document.getElementById("safetySchools").value = data.safetySchools || "";
            document.getElementById("satGoal").value = data.satGoal || "";
            document.getElementById("classes").value = data.classes || "";
            document.getElementById("extracurriculars").value = data.extracurriculars || "";
          }
        });

        // Save data
        form.addEventListener("submit", (e) => {
          e.preventDefault();
          userRef.set({
            name: document.getElementById("name").value,
            gradYear: document.getElementById("gradYear").value,
            dreamSchools: document.getElementById("dreamSchools").value,
            safetySchools: document.getElementById("safetySchools").value,
            satGoal: document.getElementById("satGoal").value,
            classes: document.getElementById("classes").value,
            extracurriculars: document.getElementById("extracurriculars").value
          }).then(() => {
            alert("Profile saved!");
          }).catch(error => {
            console.error("Error saving profile:", error);
          });
        });
      }
    });
  </script>
</body>
</html>
