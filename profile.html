<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Profile - Dream School</title>
  <link rel="stylesheet" href="./assets/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom, #2c2c2c, #000000);
      color: white;
      padding: 40px;
    }
    h2 {
      font-size: 2.2rem;
      color: #f0c948;
      margin-bottom: 20px;
    }
    .profile-container {
      max-width: 700px;
      margin: auto;
      background-color: #121212;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
      text-align: left;
    }
    .profile-field {
      margin-bottom: 20px;
    }
    .profile-label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }
    .profile-value {
      margin-left: 10px;
    }
    input[type="text"], select {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      background-color: #1a1a1a;
      color: white;
      margin-top: 5px;
    }
    button {
      margin-top: 20px;
      padding: 14px 26px;
      font-size: 1rem;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
    }
    .edit-btn {
      background-color: #f0c948;
      color: black;
    }
    .save-btn {
      background-color: #3399ff;
      color: white;
    }
  </style>
</head>
<body>
  <header>
    <h1><a href="/home.html" style="text-decoration: none; color: #f0c948;">Dream School</a></h1>
  </header>

  <main>
    <h2>Your Profile</h2>
    <div class="profile-container">
      <form id="profile-form">
        <div class="profile-field">
          <label class="profile-label" for="name">Nickname</label>
          <input type="text" id="name" disabled />
        </div>

        <div class="profile-field">
          <label class="profile-label" for="gradYear">Graduation Year</label>
          <select id="gradYear" disabled>
            <option value="">Select Year</option>
            <option value="2024">2024</option>
            <option value="2025">2025</option>
            <option value="2026">2026</option>
            <option value="2027">2027</option>
            <option value="2028">2028</option>
            <option value="2029">2029</option>
            <option value="2030">2030</option>
          </select>
        </div>

        <div class="profile-field">
          <label class="profile-label" for="dreamSchools">Dream Schools</label>
          <input type="text" id="dreamSchools" disabled />
        </div>

        <div class="profile-field">
          <label class="profile-label" for="safetySchools">Safety Schools</label>
          <input type="text" id="safetySchools" disabled />
        </div>

        <div class="profile-field">
          <label class="profile-label" for="satGoal">SAT Goal</label>
          <input type="text" id="satGoal" disabled />
        </div>

        <div class="profile-field">
          <label class="profile-label" for="classes">Current Classes</label>
          <input type="text" id="classes" disabled />
        </div>

        <div class="profile-field">
          <label class="profile-label" for="extracurriculars">Extracurriculars</label>
          <input type="text" id="extracurriculars" disabled />
        </div>

        <button type="button" id="edit-btn" class="edit-btn">✏️ Edit Profile</button>
        <button type="submit" id="save-btn" class="save-btn" style="display: none;">💾 Save Changes</button>
      </form>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 Dream School. All rights reserved.</p>
  </footer>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD7R7ZsmTpGojgLNt7w_R0tm_mWg_FZEYE",
      authDomain: "dream-school-academy.firebaseapp.com",
      projectId: "dream-school-academy",
      storageBucket: "dream-school-academy.firebasestorage.app",
      messagingSenderId: "665412130733",
      appId: "1:665412130733:web:c3d59ab2c2f065a2277324",
      measurementId: "G-HJCW8VZKZX"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const form = document.getElementById("profile-form");
    const editBtn = document.getElementById("edit-btn");
    const saveBtn = document.getElementById("save-btn");
    let currentUserRef = null;

    const toggleEditable = (editable) => {
      document.querySelectorAll("input, select").forEach(el => {
        el.disabled = !editable;
      });
      editBtn.style.display = editable ? "none" : "inline-block";
      saveBtn.style.display = editable ? "inline-block" : "none";
    };

    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = "/home.html";
      } else {
        const uid = user.uid;
        currentUserRef = db.collection("users").doc(uid);

        currentUserRef.get().then(doc => {
          if (doc.exists) {
            const data = doc.data();
            document.getElementById("name").value = data.name || "";
            document.getElementById("gradYear").value = data.gradYear || "";
            document.getElementById("dreamSchools").value = data.dreamSchools || "";
            document.getElementById("safetySchools").value = data.safetySchools || "";
            document.getElementById("satGoal").value = data.satGoal || "";
            document.getElementById("classes").value = data.classes || "";
            document.getElementById("extracurriculars").value = data.extracurriculars || "";
          }
        });
      }
    });

    editBtn.addEventListener("click", () => toggleEditable(true));

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      if (!currentUserRef) return;

      currentUserRef.set({
        name: document.getElementById("name").value,
        gradYear: document.getElementById("gradYear").value,
        dreamSchools: document.getElementById("dreamSchools").value,
        safetySchools: document.getElementById("safetySchools").value,
        satGoal: document.getElementById("satGoal").value,
        classes: document.getElementById("classes").value,
        extracurriculars: document.getElementById("extracurriculars").value
      }).then(() => {
        toggleEditable(false);
        alert("Profile updated!");
      }).catch(error => {
        console.error("Error updating profile:", error);
      });
    });
  </script>
</body>
</html>
