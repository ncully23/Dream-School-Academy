<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Profile - Dream School</title>
  <link rel="stylesheet" href="./assets/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom, #2c2c2c, #000000);
      color: white;
      padding: 40px;
    }
    h2 {
      font-size: 2.2rem;
      color: #f0c948;
      margin-bottom: 20px;
    }
    .profile-container {
      max-width: 700px;
      margin: auto;
      background-color: #121212;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
      text-align: left;
    }
    .profile-field {
      margin-bottom: 20px;
    }
    .profile-label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }
    input[type="text"], select {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      background-color: #1a1a1a;
      color: white;
      margin-top: 5px;
    }
    .button-row {
      margin-top: 8px;
    }
    button {
      font-size: 0.9rem;
      font-weight: bold;
      border: none;
      border-radius: 20px;
      padding: 8px 16px;
      margin-right: 6px;
      cursor: pointer;
    }
    .edit-btn {
      background-color: #f0c948;
      color: black;
    }
    .save-btn {
      background-color: #3399ff;
      color: white;
    }
    .cancel-btn {
      background-color: #444;
      color: white;
    }
    .status {
      display: inline-block;
      margin-left: 10px;
      font-size: 0.9rem;
      color: #8bc34a;
    }
  </style>
</head>
<body>
  <header>
    <h1><a href="/home.html" style="text-decoration: none; color: #f0c948;">Dream School</a></h1>
  </header>

  <main>
    <h2>Your Profile</h2>
    <div class="profile-container">

      <!-- Field Template -->
      <div class="profile-field" data-field="name">
        <label class="profile-label">Nickname</label>
        <input type="text" id="name" disabled />
        <div class="button-row">
          <button class="edit-btn">Edit</button>
          <button class="save-btn" style="display:none;">Save</button>
          <button class="cancel-btn" style="display:none;">Cancel</button>
          <span class="status" id="name-status"></span>
        </div>
      </div>

      <div class="profile-field" data-field="gradYear">
        <label class="profile-label">Graduation Year</label>
        <select id="gradYear" disabled>
          <option value="">Select Year</option>
          <option value="2024">2024</option>
          <option value="2025">2025</option>
          <option value="2026">2026</option>
          <option value="2027">2027</option>
          <option value="2028">2028</option>
          <option value="2029">2029</option>
          <option value="2030">2030</option>
        </select>
        <div class="button-row">
          <button class="edit-btn">Edit</button>
          <button class="save-btn" style="display:none;">Save</button>
          <button class="cancel-btn" style="display:none;">Cancel</button>
          <span class="status" id="gradYear-status"></span>
        </div>
      </div>

      <!-- Add other fields in same structure -->
      <div class="profile-field" data-field="dreamSchools">
        <label class="profile-label">Dream Schools</label>
        <input type="text" id="dreamSchools" disabled />
        <div class="button-row">
          <button class="edit-btn">Edit</button>
          <button class="save-btn" style="display:none;">Save</button>
          <button class="cancel-btn" style="display:none;">Cancel</button>
          <span class="status" id="dreamSchools-status"></span>
        </div>
      </div>

      <div class="profile-field" data-field="safetySchools">
        <label class="profile-label">Safety Schools</label>
        <input type="text" id="safetySchools" disabled />
        <div class="button-row">
          <button class="edit-btn">Edit</button>
          <button class="save-btn" style="display:none;">Save</button>
          <button class="cancel-btn" style="display:none;">Cancel</button>
          <span class="status" id="safetySchools-status"></span>
        </div>
      </div>

      <div class="profile-field" data-field="satGoal">
        <label class="profile-label">SAT Goal</label>
        <input type="text" id="satGoal" disabled />
        <div class="button-row">
          <button class="edit-btn">Edit</button>
          <button class="save-btn" style="display:none;">Save</button>
          <button class="cancel-btn" style="display:none;">Cancel</button>
          <span class="status" id="satGoal-status"></span>
        </div>
      </div>

      <div class="profile-field" data-field="classes">
        <label class="profile-label">Current Classes</label>
        <input type="text" id="classes" disabled />
        <div class="button-row">
          <button class="edit-btn">Edit</button>
          <button class="save-btn" style="display:none;">Save</button>
          <button class="cancel-btn" style="display:none;">Cancel</button>
          <span class="status" id="classes-status"></span>
        </div>
      </div>

      <div class="profile-field" data-field="extracurriculars">
        <label class="profile-label">Extracurriculars</label>
        <input type="text" id="extracurriculars" disabled />
        <div class="button-row">
          <button class="edit-btn">Edit</button>
          <button class="save-btn" style="display:none;">Save</button>
          <button class="cancel-btn" style="display:none;">Cancel</button>
          <span class="status" id="extracurriculars-status"></span>
        </div>
      </div>

    </div>
  </main>

  <footer>
    <p>&copy; 2025 Dream School. All rights reserved.</p>
  </footer>

  <script src="./profile.js"></script>
</body>
</html>
