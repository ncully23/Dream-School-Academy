<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dream School</title>
  <link rel="stylesheet" href="./assets/style.css" />

  <!-- Firebase App (core) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyD7R7ZsmTpG0jgLNt7w_R0tm_mWg_FZEYE",
    authDomain: "dream-school-academy.firebaseapp.com",
    projectId: "dream-school-academy",
    storageBucket: "dream-school-academy.appspot.com",
    messagingSenderId: "665412130733",
    appId: "1:665412130733:web:c3d59ab2c2f065a2277324",
    measurementId: "G-HJUC8WZXZK"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  function signInWithGoogle() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider)
      .then(result => {
        const user = result.user;
        document.getElementById("google-signin").style.display = "none";
        document.getElementById("user-info").innerText = `Signed in as ${user.displayName}`;
      })
      .catch(error => console.error("Sign-in error:", error));
  }

  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById("google-signin").style.display = "none";
      document.getElementById("user-info").innerText = `Signed in as ${user.displayName}`;
    }
  });
</script>

  
</head>
<body>
  <header>
    <h1><a href="/home.html" style="text-decoration: none;">Dream School</a></h1>
    <nav>
      <ul class="nav-menu">
        <li><a href="/study.html">Study</a></li>
        <li><a href="/teststrategies.html">Test Strategies</a></li>
        <li><a href="/practice.html">Practice</a></li>
        <li><a href="/tutoring.html">Tutoring</a></li>
        <li><a href="/contactus.html">Contact Us</a></li>
        <button id="google-signin" onclick="signInWithGoogle()" style="
  padding: 8px 16px;
  font-size: 14px;
  border: none;
  background-color: #ffffff;
  color: #1a73e8;
  border-radius: 4px;
  cursor: pointer;
  font-weight: bold;
  margin-left: 20px;
">
  Sign in with Google
</button>

        <li><span id="user-info" style="color:white; margin-left:10px;"></span></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h2>Don't let the SAT get in the way of your dreams.</h2>
    </section>

    <section class="cta-section">
      <h2>Free Tutoring</h2>
      <p>Click below and tell us your schedule — we’ll match you with free help.</p>
      <button class="signup-button" onclick="openModal()">Get Free Tutoring</button>
    </section>
  </main>

  <!-- Netlify Form Modal -->
  <div id="signupModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h3>Get Free Tutoring</h3>
      <form name="free-tutoring" method="POST" data-netlify="true" onsubmit="handleSubmit(event)">
        <input type="hidden" name="form-name" value="free-tutoring" />
        <label for="first-name">First Name</label>
        <input type="text" name="first-name" id="first-name" required tabindex="1" />
        <label for="last-name">Last Name</label>
        <input type="text" name="last-name" id="last-name" required tabindex="2" />
        <label for="email">Email</label>
        <input type="email" name="email" id="email" required tabindex="3" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" />
        <label for="grade">Grade in School</label>
        <select name="grade" id="grade" required tabindex="4">
          <option value="" disabled selected>Select Grade</option>
          <option value="8th">8th</option>
          <option value="9th">9th</option>
          <option value="10th">10th</option>
          <option value="11th">11th</option>
          <option value="12th">12th</option>
          <option value="College">College</option>
          <option value="Other">Other</option>
        </select>
        <label>Preferred Contact Days</label>
        <label><input type="checkbox" name="contact-days" value="Weekdays" /> Weekdays</label>
        <label><input type="checkbox" name="contact-days" value="Weekends" /> Weekends</label>
        <label>Preferred Contact Time</label>
        <label><input type="checkbox" name="contact-time" value="Day" /> Day</label>
        <label><input type="checkbox" name="contact-time" value="Evening" /> Evening</label>
        <label for="comments">Anything else you'd like us to know?</label>
        <textarea name="comments" id="comments" rows="4" placeholder="e.g. specific times, test date, goals, past scores..." style="width: 100%; padding: 10px; border-radius: 5px; margin-top: 8px;"></textarea>
        <button type="submit" id="submitBtn" tabindex="5">Sign Up</button>
      </form>
    </div>
  </div>

  <footer>
    <p>&copy; 2025 Dream School. All rights reserved.</p>
  </footer>

  <script>
    function openModal() {
      document.getElementById('signupModal').style.display = 'block';
      document.body.classList.add('modal-open');
      setTimeout(() => {
        document.getElementById('first-name').focus();
      }, 100);
    }
    function closeModal() {
      document.getElementById('signupModal').style.display = 'none';
      document.body.classList.remove('modal-open');
    }
    window.onclick = function(event) {
      const modal = document.getElementById('signupModal');
      if (event.target == modal) {
        closeModal();
      }
    };
    document.addEventListener("keydown", function(event) {
      if (event.key === "Escape") {
        closeModal();
      }
    });
    function handleSubmit(event) {
      event.preventDefault();
      const btn = document.getElementById("submitBtn");
      btn.innerText = "Submitting...";
      btn.disabled = true;
      event.target.submit();
      setTimeout(() => {
        alert("Thanks for signing up! Check your email soon.");
        closeModal();
      }, 500);
    }
  </script>
</body>
</html>
