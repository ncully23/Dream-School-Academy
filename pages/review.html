<!DOCTYPE html>
<html lang="en" data-page="review">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Review</title>

  <!-- Global site styling (controls dark theme + header/nav/buttons) -->
  <link rel="stylesheet" href="/assets/css/site.css" />

  <!-- Review-only styling (dark-friendly, no site-wide class overrides) -->
  <style>
    /* IMPORTANT:
       Do NOT redefine :root tokens that site.css already uses.
       We only style review-specific classes below. */

    .review-wrap{
      max-width:1100px;
      margin:0 auto;
      padding:20px 16px 80px;
    }

    /* Dark-friendly surfaces */
    .review-card{
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius:14px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.25);
      padding:16px;
      backdrop-filter: blur(6px);
    }

    .review-muted{ opacity:.75; }

    .review-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:10px;
    }

    .review-title{
      margin:.25rem 0 .35rem;
      font-size:28px;
      font-weight:900;
      letter-spacing:.2px;
    }

    .review-score{
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.12);
      color:#fff;
      border-radius:999px;
      padding:10px 12px;
      font-weight:900;
      display:inline-flex;
      gap:10px;
      align-items:center;
      white-space:nowrap;
    }
    .review-score span.small{
      font-size:13px;
      font-weight:700;
      opacity:.9;
    }

    .review-chips{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }
    .review-chip{
      font-size:13px;
      border-radius:999px;
      padding:6px 10px;
      border:1px solid rgba(105,229,255,0.35);
      background: rgba(105,229,255,0.10);
      color: rgba(233,238,247,0.95);
      font-weight:800;
    }

    .review-btnrow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    /* Review page buttons only (don’t touch .btn used by your header) */
    .review-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      padding:10px 14px;
      font-weight:900;
      cursor:pointer;
      text-decoration:none;
      color: inherit;
    }
    .review-btn:hover{ filter:brightness(1.06); }

    .review-btn.primary{
      border-color: rgba(105,229,255,0.55);
      background: rgba(105,229,255,0.18);
    }

    /* Question grid */
    .review-qs{
      margin-top:14px;
      display:grid;
      gap:12px;
    }

    .review-q{
      border:1px solid rgba(255,255,255,0.10);
      border-radius:12px;
      padding:14px;
      background: rgba(255,255,255,0.03);
    }

    .review-q.ok{
      border-color: rgba(17,163,106,.45);
      background: linear-gradient(to bottom, rgba(17,163,106,.14), rgba(255,255,255,0.02));
    }
    .review-q.no{
      border-color: rgba(211,51,51,.45);
      background: linear-gradient(to bottom, rgba(211,51,51,.14), rgba(255,255,255,0.02));
    }
    .review-q.na{
      border-color: rgba(160,170,185,.35);
      background: linear-gradient(to bottom, rgba(160,170,185,.10), rgba(255,255,255,0.02));
    }

    .review-qhead{
      display:flex;
      align-items:flex-start;
      gap:10px;
      margin-bottom:10px;
    }

    .review-badge{
      width:32px;
      height:32px;
      border-radius:6px;
      display:grid;
      place-items:center;
      font-weight:900;
      color:#fff;
      flex:0 0 auto;
      background: rgba(160,170,185,.55);
    }
    .review-badge.ok{ background: rgba(17,163,106,.85); }
    .review-badge.no{ background: rgba(211,51,51,.85); }
    .review-badge.na{ background: rgba(71,85,105,.85); }

    .review-prompt{ font-weight:900; }

    .review-submeta{
      margin-top:4px;
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    }

    .review-tag{
      font-size:12px;
      border-radius:999px;
      padding:3px 8px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      white-space:nowrap;
      font-weight:800;
    }

    .review-tag.skill{
      border-color: rgba(14,165,233,.45);
      background: rgba(14,165,233,.16);
    }
    .review-tag.diff{
      border-color: rgba(245,158,11,.45);
      background: rgba(245,158,11,.14);
    }

    .review-choices{
      margin-top:6px;
      display:grid;
      gap:6px;
    }

    .review-choice{
      border:1px solid rgba(255,255,255,0.10);
      border-radius:10px;
      padding:8px 10px;
      background: rgba(255,255,255,0.04);
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
    }

    .review-choice.correct{
      border-color: rgba(167,243,208,0.45);
      background: rgba(16,185,129,0.10);
    }
    .review-choice.your{
      border-color: rgba(199,210,254,0.45);
      background: rgba(99,102,241,0.12);
    }

    .review-tags{
      display:flex;
      gap:6px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .review-tag.you{
      border-color: rgba(199,210,254,0.55);
      background: rgba(99,102,241,0.16);
    }
    .review-tag.correct{
      border-color: rgba(187,247,208,0.55);
      background: rgba(16,185,129,0.16);
    }
    .review-tag.wrong{
      border-color: rgba(254,205,211,0.55);
      background: rgba(244,63,94,0.14);
    }
    .review-tag.unanswered{
      border-color: rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.06);
      opacity:.9;
    }

    .review-exp{
      margin-top:10px;
      opacity:.9;
    }

    details.review-deep{
      margin-top:10px;
      border:1px solid rgba(255,255,255,0.10);
      border-radius:12px;
      background: rgba(0,0,0,0.18);
      padding:10px 12px;
    }
    details.review-deep > summary{
      cursor:pointer;
      list-style:none;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      font-weight:900;
    }
    details.review-deep > summary::-webkit-details-marker{display:none}
    .review-chev{
      width:10px;height:10px;
      border-right:2px solid rgba(233,238,247,0.75);
      border-bottom:2px solid rgba(233,238,247,0.75);
      transform:rotate(-45deg);
      transition:transform .15s ease;
    }
    details.review-deep[open] .review-chev{transform:rotate(45deg)}

    .review-empty{
      max-width:760px;
      margin:40px auto;
      text-align:center;
    }

    .review-code{
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.12);
      padding:2px 6px;
      border-radius:6px;
      font-size:13px;
    }
  </style>
</head>

<body>
  <!-- Shell injects header/footer + wires auth UI -->
  <div id="site-header"></div>
  <div id="site-footer"></div>

  <div class="review-wrap">
    <div class="review-card" id="headerCard">
      <div class="review-top">
        <div>
          <h1 class="review-title" id="title">Review</h1>
          <div class="review-muted" id="meta"></div>
          <div class="review-chips" id="chips"></div>
          <div class="review-btnrow" id="actions" style="display:none">
            <a class="review-btn" id="backToQuiz" href="/pages/quiz.html">Back to Quiz</a>
          </div>
        </div>
        <div class="review-score" id="scorePill"></div>
      </div>
    </div>

    <div class="review-qs" id="qs"></div>

    <div class="review-card review-empty" id="empty" style="display:none">
      <h2 style="margin:.25rem 0 .35rem">No attempt found</h2>
      <p class="review-muted">
        This page expects <span class="review-code">?attemptId=...</span> and a stored quiz attempt.
      </p>
      <div class="review-btnrow">
        <a class="review-btn primary" href="/pages/quiz.html">Go to Quiz</a>
      </div>
      <p class="review-muted" style="margin-top:12px">
        Run a quiz first so it can redirect you here automatically.
      </p>
    </div>
  </div>

  <!-- Global shell (injects header/footer + auth + active nav) -->
  <script type="module" src="/assets/js/shell.js"></script>

  <!-- Review logic -->
  <script type="module" src="/assets/js/pages/reviewpage.js"></script>
</body>
</html>
