<!DOCTYPE html>
<html lang="en" data-page="review">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Review</title>

  <!-- Global site styling (dark theme + header/nav/buttons) -->
  <link rel="stylesheet" href="/assets/css/site.css" />

  <!-- MathJax (TeX) -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)'], ['$', '$']],
        displayMath: [['\\[', '\\]'], ['$$', '$$']]
      },
      options: {
        skipHtmlTags: ['script','noscript','style','textarea','pre','code']
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <style>
    /* Review-only styling.
       Do NOT redefine :root tokens from site.css. */

    .review-wrap{
      max-width:1100px;
      margin:0 auto;
      padding:20px 16px 80px;
    }

    .review-card{
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius:16px;
      box-shadow: 0 14px 34px rgba(0,0,0,0.28);
      padding:16px;
      backdrop-filter: blur(6px);
    }

    .review-muted{ opacity:.78; }

    .review-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:14px;
      margin-bottom:12px;
    }

    .review-title{
      margin:.25rem 0 .35rem;
      font-size:30px;
      font-weight:950;
      letter-spacing:.2px;
      line-height:1.1;
    }

    .review-score{
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.12);
      color:#fff;
      border-radius:999px;
      padding:10px 12px;
      font-weight:950;
      display:inline-flex;
      gap:10px;
      align-items:center;
      white-space:nowrap;
    }
    .review-score span.small{
      font-size:13px;
      font-weight:800;
      opacity:.9;
    }

    .review-chips{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }
    .review-chip{
      font-size:13px;
      border-radius:999px;
      padding:6px 10px;
      border:1px solid rgba(105,229,255,0.35);
      background: rgba(105,229,255,0.10);
      color: rgba(233,238,247,0.95);
      font-weight:900;
    }

    .review-btnrow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .review-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      padding:10px 14px;
      font-weight:950;
      cursor:pointer;
      text-decoration:none;
      color: inherit;
      user-select:none;
    }
    .review-btn:hover{ filter:brightness(1.06); }

    .review-btn.primary{
      border-color: rgba(105,229,255,0.55);
      background: rgba(105,229,255,0.18);
    }

    /* Legend */
    .review-legend{
      margin-top:12px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    .review-legend-item{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      padding:7px 10px;
      border-radius:999px;
      font-size:13px;
      font-weight:900;
      opacity:.95;
    }
    .review-dot{
      width:10px;
      height:10px;
      border-radius:999px;
      display:inline-block;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
    }
    .review-dot.green{ background: rgba(16,185,129,0.95); }
    .review-dot.red{ background: rgba(244,63,94,0.95); }
    .review-dot.gray{ background: rgba(148,163,184,0.9); }

    /* Question list */
    .review-qs{
      margin-top:14px;
      display:grid;
      gap:12px;
    }

    .review-q{
      border:1px solid rgba(255,255,255,0.10);
      border-radius:14px;
      padding:14px;
      background: rgba(255,255,255,0.03);
    }

    .review-q.ok{
      border-color: rgba(16,185,129,.45);
      background: linear-gradient(to bottom, rgba(16,185,129,.13), rgba(255,255,255,0.02));
    }
    .review-q.no{
      border-color: rgba(244,63,94,.45);
      background: linear-gradient(to bottom, rgba(244,63,94,.13), rgba(255,255,255,0.02));
    }
    .review-q.na{
      border-color: rgba(148,163,184,.35);
      background: linear-gradient(to bottom, rgba(148,163,184,.09), rgba(255,255,255,0.02));
    }

    .review-qhead{
      display:flex;
      align-items:flex-start;
      gap:10px;
      margin-bottom:10px;
    }

    .review-badge{
      width:34px;
      height:34px;
      border-radius:10px;
      display:grid;
      place-items:center;
      font-weight:950;
      color:#fff;
      flex:0 0 auto;
      background: rgba(148,163,184,.55);
    }
    .review-badge.ok{ background: rgba(16,185,129,.90); }
    .review-badge.no{ background: rgba(244,63,94,.90); }
    .review-badge.na{ background: rgba(71,85,105,.90); }

    .review-prompt{
      font-weight:950;
      letter-spacing:.1px;
      line-height:1.35;
    }

    .review-submeta{
      margin-top:6px;
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    }

    .review-tag{
      font-size:12px;
      border-radius:999px;
      padding:3px 8px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      white-space:nowrap;
      font-weight:900;
    }

    .review-tag.skill{
      border-color: rgba(14,165,233,.45);
      background: rgba(14,165,233,.16);
    }
    .review-tag.diff{
      border-color: rgba(245,158,11,.45);
      background: rgba(245,158,11,.14);
    }
    .review-tag.time{
      border-color: rgba(148,163,184,.40);
      background: rgba(148,163,184,.10);
      opacity:.95;
    }

    /* Choices */
    .review-choices{
      margin-top:10px;
      display:grid;
      gap:8px;
    }

    .review-choice{
      border:1px solid rgba(255,255,255,0.10);
      border-radius:12px;
      padding:10px 12px;
      background: rgba(255,255,255,0.04);
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      line-height:1.35;
    }

    .review-choice-left{
      display:flex;
      gap:10px;
      align-items:flex-start;
      min-width:0;
    }

    .review-letter{
      width:26px;
      height:26px;
      border-radius:8px;
      display:grid;
      place-items:center;
      font-weight:950;
      flex:0 0 auto;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.25);
      color: rgba(233,238,247,0.96);
    }

    .review-choice-text{
      font-weight:850;
      opacity:.96;
      word-break:break-word;
    }

    .review-tags{
      display:flex;
      gap:6px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
      flex:0 0 auto;
    }

    /* High-visibility status chips */
    .review-pill{
      font-size:12px;
      border-radius:999px;
      padding:3px 9px;
      font-weight:950;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      white-space:nowrap;
    }

    /* Correct choice: always green + explicit marker */
    .review-choice.correct{
      border-color: rgba(167,243,208,0.45);
      background: rgba(16,185,129,0.12);
    }
    .review-choice.correct .review-letter{
      border-color: rgba(167,243,208,0.55);
      background: rgba(16,185,129,0.18);
    }
    .review-pill.correct{
      border-color: rgba(187,247,208,0.55);
      background: rgba(16,185,129,0.18);
    }

    /* Student selected wrong: red highlight */
    .review-choice.your-wrong{
      border-color: rgba(254,205,211,0.55);
      background: rgba(244,63,94,0.12);
    }
    .review-choice.your-wrong .review-letter{
      border-color: rgba(254,205,211,0.55);
      background: rgba(244,63,94,0.18);
    }
    .review-pill.your-wrong{
      border-color: rgba(254,205,211,0.55);
      background: rgba(244,63,94,0.18);
    }

    /* Student selected correct: green, but label it as "Your answer ✓" */
    .review-choice.your-correct{
      border-color: rgba(167,243,208,0.55);
      background: rgba(16,185,129,0.12);
    }
    .review-pill.your-correct{
      border-color: rgba(187,247,208,0.55);
      background: rgba(16,185,129,0.18);
    }

    /* Unselected options */
    .review-choice.unselected{
      opacity:.92;
    }

    /* Explanation blocks */
    .review-exp{
      margin-top:10px;
      opacity:.92;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.18);
    }

    details.review-deep{
      margin-top:10px;
      border:1px solid rgba(255,255,255,0.10);
      border-radius:12px;
      background: rgba(0,0,0,0.18);
      padding:10px 12px;
    }
    details.review-deep > summary{
      cursor:pointer;
      list-style:none;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      font-weight:950;
      user-select:none;
    }
    details.review-deep > summary::-webkit-details-marker{display:none}
    .review-chev{
      width:10px;height:10px;
      border-right:2px solid rgba(233,238,247,0.75);
      border-bottom:2px solid rgba(233,238,247,0.75);
      transform:rotate(-45deg);
      transition:transform .15s ease;
      margin-left:8px;
      flex:0 0 auto;
    }
    details.review-deep[open] .review-chev{ transform:rotate(45deg) }

    .review-empty{
      max-width:760px;
      margin:40px auto;
      text-align:center;
    }

    .review-code{
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.12);
      padding:2px 6px;
      border-radius:6px;
      font-size:13px;
    }

    /* -----------------------------
       MathJax: sizing + overflow safety
       (critical because reviewpage.js injects TeX after load)
    ------------------------------ */
    mjx-container{
      font-size: 1.02em;
      max-width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 2px;
    }
    .review-prompt,
    .review-choice-text,
    .review-exp{
      overflow-wrap: anywhere;
      word-break: break-word;
    }
  </style>
</head>

<body>
  <!-- Shell injects header/footer + wires auth UI -->
  <div id="site-header"></div>

  <main class="review-wrap" id="reviewRoot">
    <div class="review-card" id="headerCard">
      <div class="review-top">
        <div>
          <h1 class="review-title" id="title">Review</h1>
          <div class="review-muted" id="meta"></div>

          <div class="review-chips" id="chips"></div>

          <div class="review-legend" aria-label="Answer legend">
            <div class="review-legend-item">
              <span class="review-dot green"></span> Correct answer
            </div>
            <div class="review-legend-item">
              <span class="review-dot red"></span> Your incorrect answer
            </div>
            <div class="review-legend-item">
              <span class="review-dot gray"></span> Other choices
            </div>
          </div>

          <div class="review-btnrow" id="actions" style="display:none">
            <a class="review-btn" id="backToQuiz" href="/pages/quiz.html">Back to Quiz</a>
          </div>
        </div>

        <div class="review-score" id="scorePill"></div>
      </div>
    </div>

    <!-- reviewpage.js should render question cards into this -->
    <div class="review-qs" id="qs"></div>

    <div class="review-card review-empty" id="empty" style="display:none">
      <h2 style="margin:.25rem 0 .35rem">No attempt found</h2>
      <p class="review-muted">
        This page expects <span class="review-code">?attemptId=...</span> and a stored quiz attempt.
      </p>
      <div class="review-btnrow">
        <a class="review-btn primary" href="/pages/quiz.html">Go to Quiz</a>
      </div>
      <p class="review-muted" style="margin-top:12px">
        Run a quiz first so it can redirect you here automatically.
      </p>
    </div>
  </main>

  <div id="site-footer"></div>

  <!-- Global shell (injects header/footer + auth + active nav) -->
  <script type="module" src="/assets/js/shell.js"></script>

  <!-- Review logic (builds DOM) -->
  <script type="module" src="/assets/js/pages/reviewpage.js"></script>

  <!-- Auto-typeset injected math:
       reviewpage.js renders after load, so we observe mutations and re-typeset. -->
  <script type="module">
    // Debounced MathJax typeset for dynamically injected content
    function typesetNow() {
      const MJ = window.MathJax;
      if (!MJ || !MJ.typesetPromise) return;
      // typeset only inside the review root to avoid touching header/footer
      const root = document.getElementById("reviewRoot");
      if (!root) return;
      MJ.typesetClear?.([root]);
      MJ.typesetPromise([root]).catch(() => {});
    }

    let t = null;
    function typesetSoon() {
      clearTimeout(t);
      t = setTimeout(typesetNow, 50);
    }

    // Run once after MathJax is likely ready
    window.addEventListener("load", () => typesetSoon());

    // Watch for DOM changes caused by reviewpage.js
    const root = document.getElementById("reviewRoot");
    if (root && "MutationObserver" in window) {
      const obs = new MutationObserver(() => typesetSoon());
      obs.observe(root, { childList: true, subtree: true, characterData: true });
    }

    // If you ever manually toggle details/open content, ensure math typesets
    document.addEventListener("toggle", (e) => {
      if (e.target && e.target.matches && e.target.matches("details.review-deep")) {
        typesetSoon();
      }
    }, true);
  </script>
</body>
</html>
