<!DOCTYPE html>
<html lang="en" data-page="review">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Review</title>

  <!-- Global site styling (header/nav/buttons) -->
  <link rel="stylesheet" href="/assets/css/site.css" />

  <!-- Page-only styles: NEVER redefine .btn/.nav/etc (keeps header colors correct) -->
  <style>
    :root{
      --bg:#eef2fb;
      --surface:#fff;
      --ink:#0f172a;
      --muted:#64748b;
      --line:#d9e0f2;
      --good:#11a36a;
      --bad:#d33;
      --pill:#0b1227;
      --blue:#1f4dd8;
      --shadow:0 6px 14px rgba(16,24,40,.08);

      --chip:#f1f5ff;
      --chip-line:#c7d2fe;
      --neutral:#475569;
      --hint:#0ea5e9;
      --warn:#b45309;
    }

    body{
      margin:0;
      background:var(--bg);
      color:var(--ink);
      font:16px/1.5 Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:20px 16px 80px;
    }

    .card{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:14px;
      box-shadow:var(--shadow);
      padding:16px;
    }

    h1{margin:.25rem 0 .35rem; font-size:28px}
    h2{margin:.25rem 0 .35rem}
    h3{margin:.25rem 0 .35rem}

    .muted{color:var(--muted)}

    .top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:10px;
    }

    .score{
      background:var(--pill);
      color:#fff;
      border-radius:999px;
      padding:10px 12px;
      font-weight:900;
      display:inline-flex;
      gap:10px;
      align-items:center;
      white-space:nowrap;
    }

    .score span.small{
      font-size:13px;
      font-weight:600;
      opacity:.9;
    }

    .chips{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }

    .chip{
      font-size:13px;
      border-radius:999px;
      padding:6px 10px;
      border:1px solid var(--chip-line);
      background:var(--chip);
      color:#1e2a6b;
      font-weight:700;
    }

    .btnrow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    /* REVIEW PAGE buttons only (avoid colliding with header .btn in site.css) */
    .review-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      padding:10px 14px;
      font-weight:900;
      cursor:pointer;
      text-decoration:none;
      color:var(--ink);
    }
    .review-btn:hover{filter:brightness(.985)}
    .review-btn.primary{
      background:var(--blue);
      border-color:var(--blue);
      color:#fff;
    }
    .review-btn.primary:hover{filter:brightness(.95)}

    /* Question grid */
    .qs{
      margin-top:14px;
      display:grid;
      gap:12px;
    }

    .q{
      border:1px solid var(--line);
      border-radius:12px;
      padding:14px;
      background:#fff;
    }

    .q.ok{
      border-color:rgba(17,163,106,.35);
      background:linear-gradient(to bottom, #f0fdf4, #ffffff);
    }

    .q.no{
      border-color:rgba(211,51,51,.3);
      background:linear-gradient(to bottom, #fff1f2, #ffffff);
    }

    .q.na{
      border-color:rgba(71,85,105,.25);
      background:linear-gradient(to bottom, #f8fafc, #ffffff);
    }

    .qhead{
      display:flex;
      align-items:flex-start;
      gap:10px;
      margin-bottom:10px;
    }

    .badge{
      width:32px;
      height:32px;
      border-radius:6px;
      display:grid;
      place-items:center;
      font-weight:900;
      color:#fff;
      flex:0 0 auto;
    }

    .badge.ok{background:var(--good)}
    .badge.no{background:var(--bad)}
    .badge.na{background:var(--neutral)}

    .prompt{font-weight:900}

    .submeta{
      margin-top:4px;
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    }

    .tag{
      font-size:12px;
      border-radius:999px;
      padding:3px 8px;
      border:1px solid transparent;
      white-space:nowrap;
      font-weight:800;
    }

    .tag.skill{
      background:#ecfeff;
      color:#155e75;
      border-color:#a5f3fc;
    }

    .tag.diff{
      background:#fff7ed;
      color:#7c2d12;
      border-color:#fed7aa;
    }

    .choices{
      margin-top:6px;
      display:grid;
      gap:6px;
    }

    .choice{
      border:1px solid var(--line);
      border-radius:10px;
      padding:8px 10px;
      background:#f7f8fd;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
    }

    .choice.correct{
      border-color:#a7f3d0;
      background:#ecfdf5;
    }

    .choice.your{
      border-color:#c7d2fe;
      background:#eef2ff;
    }

    .tags{
      display:flex;
      gap:6px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .tag.you{
      background:#eef2ff;
      color:#3730a3;
      border-color:#c7d2fe;
    }

    .tag.correct{
      background:#f0fdf4;
      color:#166534;
      border-color:#bbf7d0;
    }

    .tag.wrong{
      background:#fff1f2;
      color:#991b1b;
      border-color:#fecdd3;
    }

    .tag.unanswered{
      background:#f9fafb;
      color:#4b5563;
      border-color:#e5e7eb;
    }

    .exp{
      margin-top:10px;
      color:var(--muted);
    }
    .exp b{color:var(--ink)}

    details.deep{
      margin-top:10px;
      border:1px solid var(--line);
      border-radius:12px;
      background:#ffffff;
      padding:10px 12px;
    }

    details.deep > summary{
      cursor:pointer;
      list-style:none;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      font-weight:800;
    }

    details.deep > summary::-webkit-details-marker{display:none}

    .chev{
      width:10px;height:10px;
      border-right:2px solid #334155;
      border-bottom:2px solid #334155;
      transform:rotate(-45deg);
      transition:transform .15s ease;
    }

    details.deep[open] .chev{transform:rotate(45deg)}

    .empty{
      max-width:760px;
      margin:40px auto;
      text-align:center;
    }

    code{
      background:#0b1227;
      color:#fff;
      padding:2px 6px;
      border-radius:6px;
      font-size:13px;
    }
  </style>
</head>

<body>
  <!-- Shell injects header/footer + wires auth UI -->
  <div id="site-header"></div>
  <div id="site-footer"></div>

  <div class="wrap">
    <div class="card" id="headerCard">
      <div class="top">
        <div>
          <h1 id="title">Review</h1>
          <div class="muted" id="meta"></div>
          <div class="chips" id="chips"></div>
          <div class="btnrow" id="actions" style="display:none">
            <a class="review-btn" id="backToQuiz" href="/pages/quiz.html">Back to Quiz</a>
          </div>
        </div>
        <div class="score" id="scorePill"></div>
      </div>
    </div>

    <div class="qs" id="qs"></div>

    <div class="card empty" id="empty" style="display:none">
      <h2>No attempt found</h2>
      <p class="muted">
        This page expects <code>?attemptId=...</code> and a stored quiz attempt.
      </p>
      <div class="btnrow">
        <a class="review-btn primary" href="/pages/quiz.html">Go to Quiz</a>
      </div>
      <p class="muted" style="margin-top:12px">
        Run a quiz first so it can redirect you here automatically.
      </p>
    </div>
  </div>

  <!-- Global shell (injects header/footer + auth + active nav) -->
  <script type="module" src="/assets/js/shell.js"></script>

  <!-- Review logic -->
  <script type="module" src="/assets/js/pages/reviewpage.js"></script>
</body>
</html>
