<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Profile - Dream School</title>
  <link rel="stylesheet" href="./assets/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<style>
  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to bottom, #2c2c2c, #000000);
    color: white;
    padding: 40px;
  }

  h2 {
    font-size: 2.2rem;
    color: #f0c948;
    margin-bottom: 30px;
    text-align: center;
  }

  .profile-container {
    max-width: 700px;
    margin: auto;
    background-color: #121212;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
    text-align: left;
  }

  .profile-field {
    margin-bottom: 25px;
  }

  .profile-label {
    font-weight: bold;
    display: block;
    margin-bottom: 8px;
  }

  input[type="text"],
  select {
    width: 100%;
    padding: 14px;
    font-size: 1rem;
    border: none;
    border-radius: 6px;
    background-color: #1a1a1a;
    color: white;
    margin-bottom: 8px;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 6px;
  }

  .edit-btn, .save-btn, .cancel-btn {
    padding: 10px 16px;
    border-radius: 6px;
    border: none;
    font-weight: bold;
    cursor: pointer;
  }

  .edit-btn {
    background-color: #f0c948;
    color: black;
  }

  .save-btn {
    background-color: #3399ff;
    color: white;
    display: none;
  }

  .cancel-btn {
    background-color: #666;
    color: white;
    display: none;
  }

  .status-msg {
    font-size: 0.9rem;
    color: #ccc;
    margin-top: 4px;
  }

  footer {
    text-align: center;
    margin-top: 60px;
    color: #aaa;
    font-size: 0.9rem;
  }
</style>
<body>
  <header>
    <h1><a href="/home.html" style="text-decoration: none; color: #f0c948;">Dream School</a></h1>
  </header>

  <main>
    <h2>Your Profile</h2>
    <div class="profile-container">

      <!-- Nickname -->
      <div class="profile-field">
        <label class="profile-label" for="name">Nickname</label>
        <input type="text" id="name" disabled />
        <div class="btn-row">
          <button id="name-edit" class="edit-btn">✏️ Edit</button>
          <button id="name-save" class="save-btn">💾 Save</button>
          <button id="name-cancel" class="cancel-btn">Cancel</button>
        </div>
        <div id="name-status" class="status-msg"></div>
      </div>

      <!-- Graduation Year -->
      <div class="profile-field">
        <label class="profile-label" for="gradYear">Graduation Year</label>
        <select id="gradYear" disabled>
          <option value="">Select Year</option>
          <option value="2024">2024</option>
          <option value="2025">2025</option>
          <option value="2026">2026</option>
          <option value="2027">2027</option>
          <option value="2028">2028</option>
          <option value="2029">2029</option>
          <option value="2030">2030</option>
        </select>
        <div class="btn-row">
          <button id="gradYear-edit" class="edit-btn">✏️ Edit</button>
          <button id="gradYear-save" class="save-btn">💾 Save</button>
          <button id="gradYear-cancel" class="cancel-btn">Cancel</button>
        </div>
        <div id="gradYear-status" class="status-msg"></div>
      </div>

      <!-- Dream Schools -->
      <div class="profile-field">
        <label class="profile-label" for="dreamSchools">Dream Schools</label>
        <input type="text" id="dreamSchools" disabled />
        <div class="btn-row">
          <button id="dreamSchools-edit" class="edit-btn">✏️ Edit</button>
          <button id="dreamSchools-save" class="save-btn">💾 Save</button>
          <button id="dreamSchools-cancel" class="cancel-btn">Cancel</button>
        </div>
        <div id="dreamSchools-status" class="status-msg"></div>
      </div>

    </div>
  </main>

  <footer>
    <p>&copy; 2025 Dream School. All rights reserved.</p>
  </footer>

  <!-- Firebase & JS -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="./assets/profile.js"></script>
</body>
</html>
