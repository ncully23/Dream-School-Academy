<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Practice Test</title>
  <style>
    body {
      background-color: #f2f5fa;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
    }

    .container {
      max-width: 900px;
      margin: 60px auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
    }

    .question-box {
      display: none;
    }

    .question-box.active {
      display: block;
    }

    h2 {
      font-size: 18px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      padding: 14px 18px;
      margin-bottom: 12px;
      border: 2px solid #ccc;
      border-radius: 6px;
      background-color: #f9f9f9;
      cursor: pointer;
      font-size: 16px;
    }

    input[type="radio"] {
      display: none;
    }

    input[type="radio"]:checked + label {
      border-color: #0057d9;
      background-color: #e6f0ff;
    }

    .results {
      display: none;
    }

    .result-item {
      margin: 15px 0;
      padding: 10px;
      border-left: 5px solid;
    }

    .correct {
      border-color: #28a745;
      background-color: #eaf8ee;
    }

    .incorrect {
      border-color: #dc3545;
      background-color: #fbeaea;
    }

    /* Top Header Bar */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #e6edf8;
      padding: 10px 20px;
      color: #000;
      height: 50px;
      font-size: 16px;
      border-bottom: 2px solid #ccd9e8;
    }

    .header-left,
    .header-center,
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-center {
      flex-grow: 1;
      justify-content: center;
    }

    .timer {
      font-weight: bold;
      font-size: 18px;
    }

    .hide-button {
      font-size: 12px;
      background: #ddd;
      color: #000;
      border-radius: 4px;
      padding: 2px 8px;
      cursor: pointer;
      border: none;
    }

    .directions-button {
      font-size: 14px;
      background: none;
      border: none;
      cursor: pointer;
      color: #1f2e78;
    }

    .header-right button {
      background-color: white;
      color: #1f2e78;
      border: none;
      padding: 5px 10px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
    }

    .header-right button:hover {
      background-color: #e6e9f3;
    }

    /* Bottom Bar (Bluebook-style) */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background-color: #e6edf8;
      border-top: 2px dashed #000;
      font-size: 14px;
      z-index: 1000;
    }

    .student-name {
      font-weight: 500;
      color: #000;
    }

    .question-counter {
      font-size: 15px;
      font-weight: bold;
      background-color: #000;
      color: white;
      padding: 6px 14px;
      border-radius: 6px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .nav-buttons button {
      background-color: #1f4ed8;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      margin-left: 8px;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
    }

    .nav-buttons button:hover {
      background-color: #103bbd;
    }
  </style>
</head>

<body>
  <!-- Top Header -->
  <div class="top-bar">
    <div class="header-left">
      <div class="section-label">Section II, Module 1: Math</div>
      <button class="directions-button">Directions</button>
    </div>

    <div class="header-center">
      <div class="timer" id="timer">0:00</div>
      <button class="hide-button" onclick="document.getElementById('timer').style.display='none'">Hide</button>
    </div>

    <div class="header-right">
      <button>Calculator</button>
      <button>Reference</button>
      <button>More</button>
    </div>
  </div>

  <!-- Main Quiz Content -->
  <div class="container">
    <form id="quiz-form">
      <!-- Questions will be dynamically inserted here -->
    </form>
  </div>

  <!-- Bottom Bar (Fixed to Viewport) -->
  <div class="bottom-bar">
    <div class="student-name">Nick Cully</div>
    <div class="question-counter">Question 7 of 27</div>
    <div class="nav-buttons">
      <button type="button">Back</button>
      <button type="button">Next</button>
    </div>
  </div>
</body>
</html>
