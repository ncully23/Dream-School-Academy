<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Summary</title>
<style>
  :root{
    --bg:#eef2fb;
    --surface:#fff;
    --ink:#0f172a;
    --muted:#64748b;
    --line:#d9e0f2;
    --good:#11a36a;
    --bad:#d33;
    --pill:#0b1227;
    --shadow:0 6px 14px rgba(16,24,40,.08);
    --neutral:#475569;
  }
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font:16px/1.5 Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
  }
  .wrap{
    max-width:1100px;
    margin:0 auto;
    padding:20px 16px 80px;
  }
  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:14px;
    box-shadow:var(--shadow);
    padding:16px;
  }
  h1{margin:.25rem 0 .35rem}
  h2{margin:.25rem 0 .35rem}
  .muted{color:var(--muted)}
  .top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
  }
  .score{
    background:var(--pill);
    color:#fff;
    border-radius:999px;
    padding:8px 12px;
    font-weight:800;
    display:inline-flex;
    gap:10px;
    align-items:center;
  }
  .score span.small{
    font-size:13px;
    font-weight:500;
    opacity:.9;
  }

  .qs{
    margin-top:14px;
    display:grid;
    gap:12px;
  }
  .q{
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px;
    background:#fff;
  }
  .q.ok{
    border-color:rgba(17,163,106,.35);
    background:linear-gradient(to bottom, #f0fdf4, #ffffff);
  }
  .q.no{
    border-color:rgba(211,51,51,.3);
    background:linear-gradient(to bottom, #fff1f2, #ffffff);
  }
  .q.na{
    border-color:rgba(71,85,105,.25);
    background:linear-gradient(to bottom, #f8fafc, #ffffff);
  }
  .qhead{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:8px;
  }
  .badge{
    width:32px;
    height:32px;
    border-radius:6px;
    display:grid;
    place-items:center;
    font-weight:900;
    color:#fff;
  }
  .badge.ok{background:var(--good)}
  .badge.no{background:var(--bad)}
  .badge.na{background:var(--neutral)}
  .prompt{font-weight:800}
  .choices{
    margin-top:6px;
    display:grid;
    gap:6px;
  }
  .choice{
    border:1px solid var(--line);
    border-radius:10px;
    padding:8px 10px;
    background:#f7f8fd;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
  }
  .choice.correct{
    border-color:#a7f3d0;
    background:#ecfdf5;
  }
  .choice.your{
    border-color:#c7d2fe;
    background:#eef2ff;
  }

  .tags{
    display:flex;
    gap:6px;
    align-items:center;
    flex-wrap:wrap;
    justify-content:flex-end;
  }
  .tag{
    font-size:12px;
    border-radius:999px;
    padding:3px 8px;
    border:1px solid transparent;
    white-space:nowrap;
  }
  .tag.you{
    background:#eef2ff;
    color:#3730a3;
    border-color:#c7d2fe;
  }
  .tag.correct{
    background:#f0fdf4;
    color:#166534;
    border-color:#bbf7d0;
  }
  .tag.wrong{
    background:#fff1f2;
    color:#991b1b;
    border-color:#fecdd3;
  }
  .tag.unanswered{
    background:#f9fafb;
    color:#4b5563;
    border-color:#e5e7eb;
  }

  .exp{
    margin-top:8px;
    color:var(--muted);
  }
  .exp b{color:var(--ink)}
  .exp ul{
    margin:6px 0 0;
    padding-left:18px;
  }
  .exp li{
    margin:2px 0;
  }

  .empty{
    max-width:760px;
    margin:40px auto;
    text-align:center;
  }
  .btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 14px;
    border-radius:10px;
    background:#1f4dd8;
    color:#fff;
    text-decoration:none;
    font-weight:700;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="headerCard">
      <div class="top">
        <div>
          <h1 id="title">Summary</h1>
          <div class="muted" id="meta"></div>
        </div>
        <div class="score" id="scorePill"></div>
      </div>
    </div>

    <div class="qs" id="qs"></div>

    <div class="card empty" id="empty" style="display:none">
      <h2>No summary found</h2>
      <p class="muted">
        Take a practice set first, then you’ll land here automatically with a full breakdown.
      </p>
      <a class="btn" href="/practice/circles/quiz.html?quizId=circles">Start Circles practice</a>
    </div>
  </div>

<script>
(function () {
  "use strict";

  // New engine key format:
  //   dsa:attempt:<attemptId>
  // Older fallbacks kept for backwards compatibility.
  const LEGACY_CIRCLES_KEY = "dsa-circles-summary-v1";
  const LEGACY_LAST_KEY    = "dsa-last-summary";

  function getAttemptIdFromUrl() {
    try { return new URLSearchParams(location.search).get("attemptId"); }
    catch { return null; }
  }

  function getAttemptKey(attemptId) {
    return `dsa:attempt:${attemptId}`;
  }

  function safeParse(raw) {
    try { return raw ? JSON.parse(raw) : null; }
    catch { return null; }
  }

  function loadData() {
    const attemptId = getAttemptIdFromUrl();

    if (attemptId) {
      const raw = localStorage.getItem(getAttemptKey(attemptId));
      const parsed = safeParse(raw);
      if (parsed) return parsed;
    }

    // legacy fallbacks
    return (
      safeParse(localStorage.getItem(LEGACY_CIRCLES_KEY)) ||
      safeParse(localStorage.getItem(LEGACY_LAST_KEY)) ||
      null
    );
  }

  const data = loadData();

  const qsEl   = document.getElementById("qs");
  const title  = document.getElementById("title");
  const meta   = document.getElementById("meta");
  const pill   = document.getElementById("scorePill");
  const empty  = document.getElementById("empty");
  const header = document.getElementById("headerCard");

  if (!data || !Array.isArray(data.items) || data.items.length === 0) {
    header.style.display = "none";
    empty.style.display  = "block";
    document.title = "Summary";
    return;
  }

  const totals   = data.totals || {};
  const answered = Number.isFinite(totals.answered) ? totals.answered : 0;
  const correct  = Number.isFinite(totals.correct)  ? totals.correct  : 0;
  const total    = Number.isFinite(totals.total)    ? totals.total    : data.items.length;
  const scorePct = total ? Math.round((correct / total) * 100) : 0;

  const timeSpentSec = Number.isFinite(totals.timeSpentSec) ? totals.timeSpentSec : 0;
  const mins = Math.floor(timeSpentSec / 60);
  const secs = timeSpentSec % 60;
  const timeLabel = timeSpentSec ? `${mins}m ${String(secs).padStart(2,"0")}s` : "—";

  const finishedAt = data.generatedAt || new Date().toISOString();
  const finishedLabel = new Date(finishedAt).toLocaleString();

  const pageTitle = data.title || "Summary";
  title.textContent = pageTitle;
  meta.textContent  = `Answered ${answered}/${total} • Correct ${correct} • Time ${timeLabel} • Completed ${finishedLabel}`;
  pill.innerHTML = `<span>${scorePct}%</span><span class="small">Score</span>`;
  document.title = pageTitle;

  const letter = (i) => String.fromCharCode(65 + i);

  data.items.forEach((it) => {
    const userIndex = (typeof it.chosenIndex === "number") ? it.chosenIndex : null;
    const hasAnswer = userIndex !== null && userIndex !== undefined;
    const isCorrect = hasAnswer && userIndex === it.correctIndex;

    const sec = document.createElement("section");
    sec.className = "q " + (hasAnswer ? (isCorrect ? "ok" : "no") : "na");

    const badgeClass = hasAnswer ? (isCorrect ? "ok" : "no") : "na";

    // IMPORTANT:
    // quiz-engine stores prompt as either HTML or text, depending on source.
    // Your current renderer injects it as text in a div, so safest is to treat as text.
    const promptText = String(it.prompt ?? "");

    const choices = Array.isArray(it.choices) ? it.choices : [];
    const correctLetter = (typeof it.correctIndex === "number") ? letter(it.correctIndex) : "—";
    const correctText   = (typeof it.correctIndex === "number" && choices[it.correctIndex] != null)
      ? String(choices[it.correctIndex])
      : "";

    let yourLetter = "—";
    let yourText = "";
    if (hasAnswer && choices[userIndex] != null) {
      yourLetter = letter(userIndex);
      yourText = String(choices[userIndex]);
    }

    const choiceHtml = choices.map((c, i) => {
      const isAns  = i === it.correctIndex;
      const isUser = hasAnswer && i === userIndex;

      const tags = [];
      if (isUser) tags.push('<span class="tag you">Your choice</span>');
      if (isAns)  tags.push('<span class="tag correct">Correct answer</span>');
      if (isUser && !isAns) tags.push('<span class="tag wrong">Marked wrong</span>');

      const cls = ["choice", isAns ? "correct" : "", isUser ? "your" : ""].join(" ").trim();

      return `
        <div class="${cls}">
          <div><b>${letter(i)}.</b> ${String(c)}</div>
          <div class="tags">${tags.join(" ")}</div>
        </div>
      `;
    }).join("");

    const unansweredTag = !hasAnswer
      ? '<span class="tag unanswered">You left this blank</span>'
      : "";

    const skillLabel = it.skill || it.skillLabel || "";
    const difficulty = it.difficulty || "";

    const reasoning = it.explanation || "";
    const steps = Array.isArray(it.steps) ? it.steps : null;

    let solutionHtml = `
      <ul>
        <li><b>Correct answer:</b> ${correctLetter}. ${correctText}</li>
    `;

    if (!hasAnswer) {
      solutionHtml += `<li><b>Your answer:</b> (no answer selected)</li>`;
    } else {
      solutionHtml += `<li><b>Your answer:</b> ${yourLetter}. ${yourText} ${isCorrect ? "(matches the correct answer)" : "(does not match the correct answer)"}.</li>`;
    }

    if (skillLabel) {
      solutionHtml += `<li><b>What this question is testing:</b> ${skillLabel}${difficulty ? " — " + difficulty : ""}</li>`;
    } else if (difficulty) {
      solutionHtml += `<li><b>Difficulty:</b> ${difficulty}</li>`;
    }

    if (reasoning) {
      solutionHtml += `<li><b>Reasoning:</b> ${reasoning}</li>`;
    }

    if (steps && steps.length > 0) {
      solutionHtml += `<li><b>Step-by-step outline:</b><ul>`;
      steps.forEach((s) => { solutionHtml += `<li>${String(s)}</li>`; });
      solutionHtml += `</ul></li>`;
    }

    solutionHtml += `</ul>`;

    sec.innerHTML = `
      <div class="qhead">
        <div class="badge ${badgeClass}">${it.number ?? ""}</div>
        <div class="prompt"></div>
      </div>
      <div class="choices">
        ${choiceHtml}
      </div>
      <div class="exp">
        <b>Solution:</b>
        ${solutionHtml}
        ${unansweredTag}
      </div>
    `;

    // Inject prompt as TEXT to avoid accidental HTML injection.
    sec.querySelector(".prompt").textContent = promptText;

    qsEl.appendChild(sec);
  });
})();
</script>
</body>
</html>
