<!-- summary.html (fully revised: richer solution rendering + collapsible “Deep dive”) -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Summary</title>
<style>
  :root{
    --bg:#eef2fb;
    --surface:#fff;
    --ink:#0f172a;
    --muted:#64748b;
    --line:#d9e0f2;
    --good:#11a36a;
    --bad:#d33;
    --pill:#0b1227;
    --shadow:0 6px 14px rgba(16,24,40,.08);
    --neutral:#475569;
    --blue:#1f4dd8;
    --hint:#0ea5e9;
    --warn:#b45309;
  }
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font:16px/1.5 Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
  }
  .wrap{
    max-width:1100px;
    margin:0 auto;
    padding:20px 16px 80px;
  }
  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:14px;
    box-shadow:var(--shadow);
    padding:16px;
  }
  h1{margin:.25rem 0 .35rem}
  h2{margin:.25rem 0 .35rem}
  h3{margin:.25rem 0 .35rem}
  .muted{color:var(--muted)}
  .top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
  }
  .score{
    background:var(--pill);
    color:#fff;
    border-radius:999px;
    padding:8px 12px;
    font-weight:800;
    display:inline-flex;
    gap:10px;
    align-items:center;
    white-space:nowrap;
  }
  .score span.small{
    font-size:13px;
    font-weight:500;
    opacity:.9;
  }

  .qs{
    margin-top:14px;
    display:grid;
    gap:12px;
  }
  .q{
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px;
    background:#fff;
  }
  .q.ok{
    border-color:rgba(17,163,106,.35);
    background:linear-gradient(to bottom, #f0fdf4, #ffffff);
  }
  .q.no{
    border-color:rgba(211,51,51,.3);
    background:linear-gradient(to bottom, #fff1f2, #ffffff);
  }
  .q.na{
    border-color:rgba(71,85,105,.25);
    background:linear-gradient(to bottom, #f8fafc, #ffffff);
  }
  .qhead{
    display:flex;
    align-items:flex-start;
    gap:10px;
    margin-bottom:10px;
  }
  .badge{
    width:32px;
    height:32px;
    border-radius:6px;
    display:grid;
    place-items:center;
    font-weight:900;
    color:#fff;
    flex:0 0 auto;
    margin-top:1px;
  }
  .badge.ok{background:var(--good)}
  .badge.no{background:var(--bad)}
  .badge.na{background:var(--neutral)}
  .prompt{font-weight:800}
  .submeta{
    margin-top:4px;
    font-size:13px;
    color:var(--muted);
  }

  .choices{
    margin-top:6px;
    display:grid;
    gap:6px;
  }
  .choice{
    border:1px solid var(--line);
    border-radius:10px;
    padding:8px 10px;
    background:#f7f8fd;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
  }
  .choice.correct{
    border-color:#a7f3d0;
    background:#ecfdf5;
  }
  .choice.your{
    border-color:#c7d2fe;
    background:#eef2ff;
  }

  .tags{
    display:flex;
    gap:6px;
    align-items:center;
    flex-wrap:wrap;
    justify-content:flex-end;
    padding-top:2px;
  }
  .tag{
    font-size:12px;
    border-radius:999px;
    padding:3px 8px;
    border:1px solid transparent;
    white-space:nowrap;
  }
  .tag.you{
    background:#eef2ff;
    color:#3730a3;
    border-color:#c7d2fe;
  }
  .tag.correct{
    background:#f0fdf4;
    color:#166534;
    border-color:#bbf7d0;
  }
  .tag.wrong{
    background:#fff1f2;
    color:#991b1b;
    border-color:#fecdd3;
  }
  .tag.unanswered{
    background:#f9fafb;
    color:#4b5563;
    border-color:#e5e7eb;
  }
  .tag.skill{
    background:#ecfeff;
    color:#155e75;
    border-color:#a5f3fc;
  }
  .tag.diff{
    background:#fff7ed;
    color:#7c2d12;
    border-color:#fed7aa;
  }

  .exp{
    margin-top:10px;
    color:var(--muted);
  }
  .exp b{color:var(--ink)}
  .exp ul{
    margin:6px 0 0;
    padding-left:18px;
  }
  .exp li{
    margin:2px 0;
  }

  .kv{
    margin-top:8px;
    display:grid;
    gap:8px;
  }
  .row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
  }
  .pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:6px 10px;
    border-radius:999px;
    border:1px solid var(--line);
    background:#f8fafc;
    font-size:13px;
    color:var(--ink);
  }
  .pill strong{font-weight:800}
  .pill.good{border-color:#bbf7d0; background:#f0fdf4}
  .pill.bad{border-color:#fecdd3; background:#fff1f2}
  .pill.info{border-color:#a5f3fc; background:#ecfeff}
  .pill.warn{border-color:#fed7aa; background:#fff7ed}

  details.deep{
    margin-top:10px;
    border:1px solid var(--line);
    border-radius:12px;
    background:#ffffff;
    padding:10px 12px;
  }
  details.deep > summary{
    cursor:pointer;
    list-style:none;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    font-weight:800;
    color:var(--ink);
  }
  details.deep > summary::-webkit-details-marker{display:none}
  .chev{
    width:10px;height:10px;
    border-right:2px solid #334155;
    border-bottom:2px solid #334155;
    transform:rotate(-45deg);
    transition:transform .15s ease;
    flex:0 0 auto;
    margin-top:1px;
  }
  details.deep[open] .chev{transform:rotate(45deg)}
  .deepBody{
    margin-top:8px;
    color:var(--muted);
  }
  .deepBody h4{
    margin:10px 0 6px;
    color:var(--ink);
    font-size:14px;
    letter-spacing:.1px;
  }
  .rationale{
    display:grid;
    gap:8px;
    margin-top:6px;
  }
  .ratItem{
    border:1px solid var(--line);
    border-radius:10px;
    background:#f8fafc;
    padding:8px 10px;
  }
  .ratItem.correct{
    border-color:#bbf7d0;
    background:#f0fdf4;
  }
  .ratItem.wrong{
    border-color:#fed7aa;
    background:#fff7ed;
  }
  .ratHdr{
    display:flex;
    justify-content:space-between;
    gap:10px;
    align-items:flex-start;
  }
  .ratHdr b{color:var(--ink)}
  .ratLbl{
    font-size:12px;
    border-radius:999px;
    padding:2px 8px;
    border:1px solid var(--line);
    background:#fff;
    color:#334155;
    white-space:nowrap;
  }

  .empty{
    max-width:760px;
    margin:40px auto;
    text-align:center;
  }
  .btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 14px;
    border-radius:10px;
    background:var(--blue);
    color:#fff;
    text-decoration:none;
    font-weight:700;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="headerCard">
      <div class="top">
        <div>
          <h1 id="title">Summary</h1>
          <div class="muted" id="meta"></div>
        </div>
        <div class="score" id="scorePill"></div>
      </div>
    </div>

    <div class="qs" id="qs"></div>

    <div class="card empty" id="empty" style="display:none">
      <h2>No summary found</h2>
      <p class="muted">
        Take a practice set first, then you’ll land here automatically with a full breakdown.
      </p>
      <a class="btn" href="/practice/circles/quiz.html?quizId=circles">Start Circles practice</a>
    </div>
  </div>

<script>
(function () {
  "use strict";

  // Attempt key format:
  //   dsa:attempt:<attemptId>
  // Legacy fallbacks kept for backwards compatibility.
  const LEGACY_CIRCLES_KEY = "dsa-circles-summary-v1";
  const LEGACY_LAST_KEY    = "dsa-last-summary";

  function getAttemptIdFromUrl() {
    try { return new URLSearchParams(location.search).get("attemptId"); }
    catch { return null; }
  }

  function getAttemptKey(attemptId) {
    return `dsa:attempt:${attemptId}`;
  }

  function safeParse(raw) {
    try { return raw ? JSON.parse(raw) : null; }
    catch { return null; }
  }

  function loadData() {
    const attemptId = getAttemptIdFromUrl();

    if (attemptId) {
      const raw = localStorage.getItem(getAttemptKey(attemptId));
      const parsed = safeParse(raw);
      if (parsed) return parsed;
    }

    // legacy fallbacks
    return (
      safeParse(localStorage.getItem(LEGACY_CIRCLES_KEY)) ||
      safeParse(localStorage.getItem(LEGACY_LAST_KEY)) ||
      null
    );
  }

  // ---------
  // Helpers
  // ---------
  const letter = (i) => String.fromCharCode(65 + i);

  function esc(s) {
    // Defensive: escape HTML when rendering untrusted strings into innerHTML.
    return String(s ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function asArray(x) {
    return Array.isArray(x) ? x : (x ? [x] : []);
  }

  function normalizeSolution(it) {
    // Supports multiple shapes:
    // 1) it.solution (preferred; copied from bank)
    // 2) legacy: it.explanation + it.steps
    const sol = (it && typeof it.solution === "object" && it.solution) ? it.solution : null;

    if (sol) {
      return {
        finalAnswer: sol.finalAnswer ?? null,
        approach: sol.approach ?? null,
        formulas: asArray(sol.formulas || sol.formula),
        steps: asArray(sol.steps),
        whyItWorks: sol.whyItWorks ?? null,
        commonMistakes: asArray(sol.commonMistakes),
        checks: asArray(sol.checks),
        takeaway: sol.takeaway ?? null,
        choiceRationales: (sol.choiceRationales && typeof sol.choiceRationales === "object") ? sol.choiceRationales : null
      };
    }

    // legacy fallbacks
    const legacyReasoning = it.explanation ?? null;
    const legacySteps = asArray(it.steps);

    return {
      finalAnswer: null,
      approach: null,
      formulas: [],
      steps: legacySteps,
      whyItWorks: legacyReasoning,
      commonMistakes: [],
      checks: [],
      takeaway: null,
      choiceRationales: null
    };
  }

  function formatChoiceRationales(choices, correctIndex, rationalesObj) {
    // rationalesObj expected keys: "0","1","2"... or "A","B"...; tolerate both.
    if (!rationalesObj) return "";

    const blocks = choices.map((c, i) => {
      const keyNum = String(i);
      const keyLet = letter(i);
      const raw = rationalesObj[keyNum] ?? rationalesObj[keyLet] ?? "";
      const txt = String(raw || "").trim();
      if (!txt) return "";

      const isAns = i === correctIndex;
      const cls = "ratItem " + (isAns ? "correct" : "wrong");
      const lbl = isAns ? "Why this is correct" : "Why this is tempting / wrong";
      return `
        <div class="${cls}">
          <div class="ratHdr">
            <div><b>${esc(keyLet)}.</b> ${esc(c)}</div>
            <span class="ratLbl">${esc(lbl)}</span>
          </div>
          <div style="margin-top:6px">${esc(txt)}</div>
        </div>
      `;
    }).join("");

    if (!blocks.trim()) return "";
    return `<h4>Answer choice reasoning</h4><div class="rationale">${blocks}</div>`;
  }

  // ---------
  // Main render
  // ---------
  const data = loadData();

  const qsEl   = document.getElementById("qs");
  const title  = document.getElementById("title");
  const meta   = document.getElementById("meta");
  const pill   = document.getElementById("scorePill");
  const empty  = document.getElementById("empty");
  const header = document.getElementById("headerCard");

  if (!data || !Array.isArray(data.items) || data.items.length === 0) {
    header.style.display = "none";
    empty.style.display  = "block";
    document.title = "Summary";
    return;
  }

  const totals   = data.totals || {};
  const answered = Number.isFinite(totals.answered) ? totals.answered : 0;
  const correct  = Number.isFinite(totals.correct)  ? totals.correct  : 0;
  const total    = Number.isFinite(totals.total)    ? totals.total    : data.items.length;
  const scorePct = total ? Math.round((correct / total) * 100) : 0;

  const timeSpentSec = Number.isFinite(totals.timeSpentSec) ? totals.timeSpentSec : 0;
  const mins = Math.floor(timeSpentSec / 60);
  const secs = timeSpentSec % 60;
  const timeLabel = timeSpentSec ? `${mins}m ${String(secs).padStart(2,"0")}s` : "—";

  const finishedAt = data.generatedAt || new Date().toISOString();
  const finishedLabel = new Date(finishedAt).toLocaleString();

  const pageTitle = data.title || "Summary";
  title.textContent = pageTitle;
  meta.textContent  = `Answered ${answered}/${total} • Correct ${correct} • Time ${timeLabel} • Completed ${finishedLabel}`;
  pill.innerHTML = `<span>${scorePct}%</span><span class="small">Score</span>`;
  document.title = pageTitle;

  data.items.forEach((it, idx) => {
    const userIndex = (typeof it.chosenIndex === "number") ? it.chosenIndex : null;
    const hasAnswer = userIndex !== null && userIndex !== undefined;
    const isCorrect = hasAnswer && userIndex === it.correctIndex;

    const sec = document.createElement("section");
    sec.className = "q " + (hasAnswer ? (isCorrect ? "ok" : "no") : "na");

    const badgeClass = hasAnswer ? (isCorrect ? "ok" : "no") : "na";

    // Prompt: treat as text (safe)
    const promptText = String(it.prompt ?? "");

    const choices = Array.isArray(it.choices) ? it.choices : [];
    const correctLetter = (typeof it.correctIndex === "number") ? letter(it.correctIndex) : "—";
    const correctText   = (typeof it.correctIndex === "number" && choices[it.correctIndex] != null)
      ? String(choices[it.correctIndex])
      : "";

    let yourLetter = "—";
    let yourText = "";
    if (hasAnswer && choices[userIndex] != null) {
      yourLetter = letter(userIndex);
      yourText = String(choices[userIndex]);
    }

    const choiceHtml = choices.map((c, i) => {
      const isAns  = i === it.correctIndex;
      const isUser = hasAnswer && i === userIndex;

      const tags = [];
      if (isUser) tags.push('<span class="tag you">Your choice</span>');
      if (isAns)  tags.push('<span class="tag correct">Correct</span>');
      if (isUser && !isAns) tags.push('<span class="tag wrong">Marked wrong</span>');

      const cls = ["choice", isAns ? "correct" : "", isUser ? "your" : ""].join(" ").trim();

      return `
        <div class="${cls}">
          <div><b>${esc(letter(i))}.</b> ${esc(c)}</div>
          <div class="tags">${tags.join(" ")}</div>
        </div>
      `;
    }).join("");

    const skillLabel = it.skillLabel || it.skill || "";
    const difficulty = it.difficulty || "";

    const sol = normalizeSolution(it);

    // Build top pills
    const statusPill = hasAnswer
      ? (isCorrect
          ? `<span class="pill good"><strong>Status:</strong> Correct</span>`
          : `<span class="pill bad"><strong>Status:</strong> Incorrect</span>`)
      : `<span class="pill warn"><strong>Status:</strong> Unanswered</span>`;

    const skillPill = skillLabel
      ? `<span class="pill info"><strong>Skill:</strong> ${esc(skillLabel)}</span>`
      : "";

    const diffPill = difficulty
      ? `<span class="pill warn"><strong>Difficulty:</strong> ${esc(difficulty)}</span>`
      : "";

    // Core “Solution” block (always visible)
    const finalLine = (sol.finalAnswer || correctText)
      ? `${esc(correctLetter)}. ${esc(sol.finalAnswer || correctText)}`
      : `—`;

    const yourLine = !hasAnswer
      ? `(no answer selected)`
      : `${esc(yourLetter)}. ${esc(yourText)} ${isCorrect ? "(matches)" : "(does not match)"}`;

    const approachLine = sol.approach
      ? `<li><b>Approach:</b> ${esc(sol.approach)}</li>`
      : "";

    const formulaLine = (sol.formulas && sol.formulas.length)
      ? `<li><b>Key formula(s):</b> ${sol.formulas.map(f => esc(f)).join(" • ")}</li>`
      : "";

    const whyLine = sol.whyItWorks
      ? `<li><b>Why this works:</b> ${esc(sol.whyItWorks)}</li>`
      : "";

    const stepsHtml = (sol.steps && sol.steps.length)
      ? `<h4>Steps</h4><ul>${sol.steps.map(s => `<li>${esc(s)}</li>`).join("")}</ul>`
      : "";

    const mistakesHtml = (sol.commonMistakes && sol.commonMistakes.length)
      ? `<h4>Common mistakes</h4><ul>${sol.commonMistakes.map(s => `<li>${esc(s)}</li>`).join("")}</ul>`
      : "";

    const checksHtml = (sol.checks && sol.checks.length)
      ? `<h4>Quick checks</h4><ul>${sol.checks.map(s => `<li>${esc(s)}</li>`).join("")}</ul>`
      : "";

    const takeawayHtml = sol.takeaway
      ? `<h4>Takeaway</h4><div>${esc(sol.takeaway)}</div>`
      : "";

    const rationalesHtml = formatChoiceRationales(choices, it.correctIndex, sol.choiceRationales);

    const unansweredTag = !hasAnswer
      ? '<span class="tag unanswered">You left this blank</span>'
      : "";

    sec.innerHTML = `
      <div class="qhead">
        <div class="badge ${badgeClass}">${esc(it.number ?? (idx + 1))}</div>
        <div style="flex:1 1 auto">
          <div class="prompt"></div>
          <div class="submeta">
            ${skillLabel ? `<span class="tag skill">${esc(skillLabel)}</span>` : ""}
            ${difficulty ? `<span class="tag diff">${esc(difficulty)}</span>` : ""}
          </div>
        </div>
      </div>

      <div class="choices">
        ${choiceHtml}
      </div>

      <div class="exp">
        <b>Solution summary</b>
        <div class="kv">
          <div class="row">
            ${statusPill}
            ${skillPill}
            ${diffPill}
          </div>
          <ul>
            <li><b>Correct answer:</b> ${finalLine}</li>
            <li><b>Your answer:</b> ${yourLine}</li>
            ${approachLine}
            ${formulaLine}
            ${whyLine}
          </ul>
          ${unansweredTag}
        </div>

        <details class="deep">
          <summary>
            <span>Deep dive (steps, checks, and why each choice)</span>
            <span class="chev" aria-hidden="true"></span>
          </summary>
          <div class="deepBody">
            ${stepsHtml || `<div class="muted">No step-by-step details stored for this question yet.</div>`}
            ${checksHtml}
            ${mistakesHtml}
            ${takeawayHtml}
            ${rationalesHtml}
          </div>
        </details>
      </div>
    `;

    // Inject prompt as TEXT to avoid accidental HTML injection.
    sec.querySelector(".prompt").textContent = promptText;

    qsEl.appendChild(sec);
  });
})();
</script>
</body>
</html>
