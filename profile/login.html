<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dream School Academy – Login / Sign Up</title>

  <!-- Global styles -->
  <link rel="stylesheet" href="/assets/css/site.css" />

  <!-- Login page styles (keep whichever path you actually use) -->
  <link rel="stylesheet" href="/assets/login.css" />

  <!-- Page-specific layout to make the login card look right -->
  <style>
    main {
      min-height: calc(100vh - 160px);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 80px 16px 40px;
    }

    .auth-card {
      background: #0b1019;
      border-radius: 24px;
      padding: 28px 24px 26px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .auth-card h2 {
      margin: 0 0 12px 0;
      font-size: 1.5rem;
    }

    .auth-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .auth-tab {
      flex: 1;
      padding: 8px 0;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: transparent;
      color: #f9fafb;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .auth-tab.active {
      background: #2563eb;
      border-color: #2563eb;
    }

    .form-block {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 0.9rem;
    }

    .field input {
      width: 100%;
      padding: 9px 11px;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.7);
      background: #020617;
      color: #f9fafb;
      font-size: 0.95rem;
    }

    .btn-primary {
      margin-top: 4px;
      width: 100%;
      padding: 9px 12px;
      border-radius: 999px;
      border: none;
      background: #22c55e;
      color: #020617;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-google {
      margin-top: 6px;
      width: 100%;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.7);
      background: transparent;
      color: #e5e7eb;
      font-weight: 500;
      cursor: pointer;
    }

    .status {
      min-height: 1.3em;
      font-size: 0.85rem;
      color: #f97373;
    }

    .status.ok {
      color: #86efac;
    }

    .alt-action {
      margin-top: 4px;
      font-size: 0.85rem;
    }

    .alt-action a {
      color: #60a5fa;
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <!-- Header injected by shell.js -->
  <div id="site-header"></div>

  <main>
    <div class="auth-card">
      <!-- Tabs -->
      <div class="auth-tabs" role="tablist" aria-label="Authentication">
        <button id="tab-login" class="auth-tab active" type="button" role="tab" aria-selected="true">
          Login
        </button>
        <button id="tab-signup" class="auth-tab" type="button" role="tab" aria-selected="false">
          Sign Up
        </button>
      </div>

      <!-- Login form -->
      <form id="login-form" class="form-block" autocomplete="on" novalidate>
        <h2>Welcome back</h2>

        <div class="field">
          <label for="login-email">Email</label>
          <input id="login-email" name="email" type="email" inputmode="email" autocomplete="email" required />
        </div>

        <div class="field">
          <label for="login-password">Password</label>
          <input id="login-password" name="password" type="password" autocomplete="current-password" required />
        </div>

        <button class="btn-primary" type="submit">Log In</button>

        <p id="login-status" class="status" aria-live="polite"></p>

        <p class="alt-action">
          <a id="reset" href="#" role="button">Forgot password?</a>
        </p>

        <button id="google-login" class="btn-google" type="button">
          Sign in with Google
        </button>
      </form>

      <!-- Signup form -->
      <form id="signup-form" class="form-block" style="display:none;" autocomplete="on" novalidate>
        <h2>Create your account</h2>

        <div class="field">
          <label for="signup-first">First name</label>
          <input id="signup-first" name="firstName" type="text" autocomplete="given-name" />
        </div>

        <div class="field">
          <label for="signup-email">Email</label>
          <input id="signup-email" name="email" type="email" inputmode="email" autocomplete="email" required />
        </div>

        <div class="field">
          <label for="signup-password">Password</label>
          <input id="signup-password" name="password" type="password" autocomplete="new-password" required />
        </div>

        <button class="btn-primary" type="submit">Sign Up</button>

        <p id="signup-status" class="status" aria-live="polite"></p>

        <button id="google-signup" class="btn-google" type="button">
          Sign up with Google
        </button>
      </form>
    </div>
  </main>

  <!-- Footer injected by shell.js -->
  <div id="site-footer"></div>

  <!-- Inject header/footer + nav highlight (load ONCE) -->
  <script type="module" src="/assets/js/shell.js"></script>

  <!-- Login / signup logic -->
 <script type="module"> // Declare this script as an ES module to enable import/export syntax and strict mode by default
  // Import Firebase configuration and initialized instances from local firebase-init.js module
  import { auth, db, googleProvider, authReady } from "/assets/firebase-init.js"; // auth: Firebase Auth instance, db: Firestore instance, googleProvider: OAuth config for Google, authReady: Promise that resolves when Auth is fully initialized

  // Import specific Firebase Authentication functions from CDN version 10.12.4
  import {
    onAuthStateChanged, // Listener function that triggers when user login state changes (login/logout)
    signInWithEmailAndPassword, // Function to authenticate user with email and password
    createUserWithEmailAndPassword, // Function to create new user account with email and password
    sendPasswordResetEmail, // Function to send password recovery email to user
    updateProfile, // Function to update user's profile metadata like displayName
    signInWithPopup, // Function to trigger OAuth sign-in flow in a popup window
    getRedirectResult // Function to check for pending sign-in result after page redirect
  } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js"; // Load Auth SDK from Firebase CDN

  // Import specific Firebase Firestore functions from CDN version 10.12.4
  import {
    doc, // Function to create a reference to a specific document in a collection
    getDoc, // Function to fetch a document snapshot from Firestore
    setDoc, // Function to create or overwrite a document in Firestore
    serverTimestamp // Function that returns a placeholder for server-generated timestamp
  } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js"; // Load Firestore SDK from Firebase CDN

  // --- Friendly error messages: Map Firebase error codes to user-friendly text
  const nice = (e) => ({ // Define arrow function that takes error object e and returns friendly message string
    "auth/invalid-email":        "That email looks invalid.", // User-friendly message for invalid email format error
    "auth/missing-password":     "Enter your password.", // Message when password field is empty
    "auth/weak-password":        "Use 6+ characters for your password.", // Message when password doesn't meet strength requirements
    "auth/email-already-in-use": "That email is already registered.", // Message when email is already associated with an account
    "auth/user-not-found":       "No account with that email.", // Message when no user exists with provided email
    "auth/wrong-password":       "Incorrect password.", // Message when password doesn't match the account
    "auth/popup-blocked":        "Popup blocked. Allow popups and try again.", // Message when browser blocks OAuth popup window
    "auth/popup-closed-by-user": "Popup closed before completing sign-in.", // Message when user manually closes OAuth popup
    "auth/unauthorized-domain":  "This domain isn't authorized in Firebase Auth." // Message when domain isn't whitelisted in Firebase console
  }[e?.code] || e?.message || "Something went wrong."); // Look up error by e.code property, fallback to e.message, then generic message; ?. is optional chaining to avoid null errors

  // --- Ensure user profile doc exists: Create Firestore document for new users
  async function ensureProfile(u, first = "") { // Define async function that takes user object u and optional first name string with default empty
    if (!u) return; // Early exit if user object is null/undefined to prevent errors
    const ref  = doc(db, "users", u.uid); // Create Firestore document reference at path "users/{userId}" using user's unique ID
    const snap = await getDoc(ref); // Fetch the document snapshot from Firestore (async operation)
    if (!snap.exists()) { // Check if document doesn't already exist in database
      await setDoc(ref, { // Create new document with provided data (async operation)
        userId: u.uid, // Store Firebase user ID for easy reference
        email: u.email || "", // Store email address, fallback to empty string if missing
        name: (u.displayName || first || "").trim(), // Store display name from Auth profile or provided first name, trim whitespace
        createdAt: serverTimestamp() // Store server-generated timestamp for account creation time
      }); // End setDoc data object
    } // End if document doesn't exist check
  } // End ensureProfile function definition

  // --- DOM: Cache references to HTML elements for efficient access
  const tabLogin     = document.getElementById("tab-login"); // Get reference to login tab button element by ID
  const tabSignup    = document.getElementById("tab-signup"); // Get reference to signup tab button element by ID
  const loginForm    = document.getElementById("login-form"); // Get reference to login form container element by ID
  const signupForm   = document.getElementById("signup-form"); // Get reference to signup form container element by ID
  const loginStatus  = document.getElementById("login-status"); // Get reference to login status message element by ID
  const signupStatus = document.getElementById("signup-status"); // Get reference to signup status message element by ID
  const btnReset     = document.getElementById("reset"); // Get reference to password reset button element by ID
  const btnGoogleIn  = document.getElementById("google-login"); // Get reference to Google login button element by ID
  const btnGoogleUp  = document.getElementById("google-signup"); // Get reference to Google signup button element by ID

  // Helper function to update status message element with text and optional success styling
  const setStatus = (el, msg, ok = false) => { // Define arrow function taking element, message string, and optional success boolean
    if (!el) return; // Early exit if element reference is null to prevent errors
    el.textContent = msg || ""; // Set element's text content to message or empty string if falsy
    el.classList.toggle("ok", !!ok); // Add "ok" CSS class if ok is truthy, remove if falsy; !! coerces to boolean
  }; // End setStatus function definition

  // Helper function to disable or enable all interactive elements within a form
  const disable = (formEl, on) => { // Define arrow function taking form element and boolean on/off state
    if (!formEl) return; // Early exit if form element is null to prevent errors
    Array.from(formEl.querySelectorAll("button, input")).forEach((node) => { // Select all buttons and inputs in form, convert NodeList to Array, iterate each
      node.disabled = !!on; // Set disabled property to true if on is truthy, false otherwise; !! coerces to boolean
    }); // End forEach loop
  }; // End disable function definition

  // --- Tabs: Functions to switch between login and signup form views
  const showLogin = () => { // Define arrow function to display login tab and hide signup tab
    tabLogin.classList.add("active"); // Add "active" CSS class to login tab for visual highlighting
    tabSignup.classList.remove("active"); // Remove "active" CSS class from signup tab to deactivate it
    tabLogin.setAttribute("aria-selected", "true"); // Set accessibility attribute indicating login tab is selected
    tabSignup.setAttribute("aria-selected", "false"); // Set accessibility attribute indicating signup tab is not selected
    loginForm.style.display = "block"; // Show login form by setting CSS display property to block
    signupForm.style.display = "none"; // Hide signup form by setting CSS display property to none
    setStatus(loginStatus, ""); // Clear any previous status message in login status area
    setStatus(signupStatus, ""); // Clear any previous status message in signup status area
  }; // End showLogin function definition

  const showSignup = () => { // Define arrow function to display signup tab and hide login tab
    tabSignup.classList.add("active"); // Add "active" CSS class to signup tab for visual highlighting
    tabLogin.classList.remove("active"); // Remove "active" CSS class from login tab to deactivate it
    tabSignup.setAttribute("aria-selected", "true"); // Set accessibility attribute indicating signup tab is selected
    tabLogin.setAttribute("aria-selected", "false"); // Set accessibility attribute indicating login tab is not selected
    signupForm.style.display = "block"; // Show signup form by setting CSS display property to block
    loginForm.style.display = "none"; // Hide login form by setting CSS display property to none
    setStatus(loginStatus, ""); // Clear any previous status message in login status area
    setStatus(signupStatus, ""); // Clear any previous status message in signup status area
  }; // End showSignup function definition

  tabLogin.addEventListener("click", showLogin); // Attach click event listener to login tab that calls showLogin function
  tabSignup.addEventListener("click", showSignup); // Attach click event listener to signup tab that calls showSignup function
  showLogin(); // Initialize page by showing login tab as default view

  // --- Email/password login: Handle form submission for traditional login
  loginForm.addEventListener("submit", async (e) => { // Attach submit event listener to login form with async callback
    e.preventDefault(); // Prevent default form submission behavior (page reload) to handle with JavaScript
    setStatus(loginStatus, "Signing in…"); // Update status message to indicate login in progress
    disable(loginForm, true); // Disable all form inputs and buttons to prevent duplicate submissions

    try { // Begin try block to catch and handle any errors during async operations
      const email = document.getElementById("login-email").value.trim(); // Get trimmed email value from login email input field
      const pass  = document.getElementById("login-password").value; // Get password value from login password input field
      const cred  = await signInWithEmailAndPassword(auth, email, pass); // Call Firebase Auth to sign in with credentials (async)
      await ensureProfile(cred.user); // Ensure Firestore profile document exists for authenticated user (async)
      location.href = "/"; // Redirect user to homepage after successful login
    } catch (err) { // Catch any errors thrown during try block execution
      console.error(err); // Log full error details to developer console for debugging
      setStatus(loginStatus, nice(err)); // Display user-friendly error message using nice() helper function
      disable(loginForm, false); // Re-enable form inputs and buttons so user can retry
    } // End try-catch error handling block
  }); // End login form submit event listener

  // --- Password reset: Handle password recovery flow
  btnReset.addEventListener("click", async (e) => { // Attach click event listener to reset button with async callback
    e.preventDefault(); // Prevent default link/button behavior to handle with JavaScript
    const email = document.getElementById("login-email").value.trim(); // Get trimmed email value from login email input field

    if (!email) { // Check if email field is empty
      setStatus(loginStatus, "Enter your email first."); // Prompt user to provide email before proceeding
      return; // Exit function early since email is required
    } // End email validation check

    setStatus(loginStatus, "Sending reset email…"); // Update status to indicate reset email is being sent
    try { // Begin try block to catch and handle any errors during async operation
      await sendPasswordResetEmail(auth, email); // Call Firebase Auth to send password reset email (async)
      setStatus(loginStatus, "Password reset email sent.", true); // Display success message with ok=true for green styling
    } catch (err) { // Catch any errors thrown during try block execution
      console.error(err); // Log full error details to developer console for debugging
      setStatus(loginStatus, nice(err)); // Display user-friendly error message using nice() helper function
    } // End try-catch error handling block
  }); // End reset button click event listener

  // --- Google login: Handle OAuth sign-in via Google popup
  btnGoogleIn.addEventListener("click", async () => { // Attach click event listener to Google login button with async callback
    setStatus(loginStatus, "Opening Google…"); // Update status to indicate Google OAuth flow is starting
    disable(loginForm, true); // Disable login form inputs to prevent concurrent actions during OAuth

    try { // Begin try block to catch and handle any errors during async operations
      await authReady; // Wait for Firebase Auth initialization promise to resolve before proceeding
      const res = await signInWithPopup(auth, googleProvider); // Trigger Google OAuth popup and wait for result (async)
      await ensureProfile(res.user); // Ensure Firestore profile document exists for authenticated Google user (async)
      location.href = "/"; // Redirect user to homepage after successful Google sign-in
    } catch (err) { // Catch any errors thrown during try block execution
      console.error(err); // Log full error details to developer console for debugging
      setStatus(loginStatus, nice(err)); // Display user-friendly error message using nice() helper function
      disable(loginForm, false); // Re-enable form inputs so user can retry alternative login methods
    } // End try-catch error handling block
  }); // End Google login button click event listener

  // --- Email/password signup: Handle form submission for new account creation
  signupForm.addEventListener("submit", async (e) => { // Attach submit event listener to signup form with async callback
    e.preventDefault(); // Prevent default form submission behavior (page reload) to handle with JavaScript
    setStatus(signupStatus, "Creating account…"); // Update status message to indicate account creation in progress
    disable(signupForm, true); // Disable all form inputs and buttons to prevent duplicate submissions

    try { // Begin try block to catch and handle any errors during async operations
      const first = document.getElementById("signup-first").value.trim(); // Get trimmed first name value from signup input
      const email = document.getElementById("signup-email").value.trim(); // Get trimmed email value from signup input
      const pass  = document.getElementById("signup-password").value; // Get password value from signup input

      const cred = await createUserWithEmailAndPassword(auth, email, pass); // Call Firebase Auth to create new user account (async)

      if (first) { // Check if user provided a first name value
        try { await updateProfile(cred.user, { displayName: first }); } catch {} // Attempt to update Auth profile with displayName; silently ignore errors
      } // End first name conditional update

      await ensureProfile(cred.user, first); // Ensure Firestore profile document exists with provided first name as fallback (async)
      location.href = "/"; // Redirect user to homepage after successful signup
    } catch (err) { // Catch any errors thrown during try block execution
      console.error(err); // Log full error details to developer console for debugging
      setStatus(signupStatus, nice(err)); // Display user-friendly error message using nice() helper function
      disable(signupForm, false); // Re-enable form inputs and buttons so user can correct and retry
    } // End try-catch error handling block
  }); // End signup form submit event listener

  // --- Google signup: Handle OAuth sign-up via Google popup (same flow as login)
  btnGoogleUp.addEventListener("click", async () => { // Attach click event listener to Google signup button with async callback
    setStatus(signupStatus, "Opening Google…"); // Update status to indicate Google OAuth flow is starting
    disable(signupForm, true); // Disable signup form inputs to prevent concurrent actions during OAuth

    try { // Begin try block to catch and handle any errors during async operations
      await authReady; // Wait for Firebase Auth initialization promise to resolve before proceeding
      const res = await signInWithPopup(auth, googleProvider); // Trigger Google OAuth popup and wait for result (async)
      await ensureProfile(res.user); // Ensure Firestore profile document exists for authenticated Google user (async)
      location.href = "/"; // Redirect user to homepage after successful Google sign-up
    } catch (err) { // Catch any errors thrown during try block execution
      console.error(err); // Log full error details to developer console for debugging
      setStatus(signupStatus, nice(err)); // Display user-friendly error message using nice() helper function
      disable(signupForm, false); // Re-enable form inputs so user can retry alternative signup methods
    } // End try-catch error handling block
  }); // End Google signup button click event listener

  // --- Redirect fallback: Handle sign-in result if using redirect flow instead of popup
  (async () => { // Define and immediately invoke async arrow function for redirect result checking
    try { // Begin try block to catch and handle any errors during async operations
      await authReady; // Wait for Firebase Auth initialization promise to resolve before checking redirect
      const r = await getRedirectResult(auth); // Check for pending sign-in result from redirect flow (async)
      if (r?.user) { // Check if redirect result contains authenticated user object (optional chaining)
        await ensureProfile(r.user); // Ensure Firestore profile document exists for redirected user (async)
        location.href = "/"; // Redirect user to homepage after successful redirect sign-in
      } // End user existence check
    } catch (e) { // Catch any errors thrown during try block execution
      // Not fatal; only relevant for redirect flows // Comment: redirect errors are non-critical for popup-based auth
      console.warn("Redirect sign-in check failed:", e); // Log warning to console without interrupting user experience
    } // End try-catch error handling block
  })(); // End and immediately invoke async IIFE

  // Optional: auto-redirect if already signed in (commented out by default)
  onAuthStateChanged(auth, (user) => { // Register listener that fires whenever Firebase Auth state changes
    // If you prefer, uncomment: // Comment: this block is optional and disabled by default
    // if (user) location.href = "/"; // If user is authenticated, automatically redirect to homepage (currently commented out)
  }); // End onAuthStateChanged listener registration
</script> // End module script tag
</body>
</html>
